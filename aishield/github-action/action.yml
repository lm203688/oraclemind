name: 'AIShield Security Audit'
description: 'AI工具安全审计 - 自动扫描MCP/GPT/Skill的安全风险'
branding:
  icon: 'shield'
  color: 'purple'
inputs:
  tool_type:
    description: '工具类型: mcp, skill, gpt, prompt'
    required: false
    default: 'mcp'
  source_url:
    description: '工具源码URL（默认使用当前仓库）'
    required: false
    default: ''
  name:
    description: '工具名称（默认使用仓库名）'
    required: false
    default: ''
  api_key:
    description: 'AIShield API Key（免费版3次/天，Pro版100次/天）'
    required: false
    default: ''
  api_url:
    description: 'AIShield API地址'
    required: false
    default: 'https://aishield.ai'
  fail_on_risk:
    description: '高风险时是否让CI失败'
    required: false
    default: 'false'
outputs:
  audit_id:
    description: '审计ID'
  overall_score:
    description: '总体评分'
  risk_level:
    description: '风险等级'
  badge_level:
    description: '徽章等级'
runs:
  using: 'composite'
  steps:
    - name: Run AIShield Audit
      shell: bash
      run: |
        SOURCE_URL="${{ inputs.source_url }}"
        if [ -z "$SOURCE_URL" ]; then
          SOURCE_URL="${{ github.server_url }}/${{ github.repository }}"
        fi
        TOOL_NAME="${{ inputs.name }}"
        if [ -z "$TOOL_NAME" ]; then
          TOOL_NAME="${{ github.event.repository.name }}"
        fi
        API_URL="${{ inputs.api_url }}"
        API_KEY="${{ inputs.api_key }}"
        echo "🛡️ AIShield Security Audit"
        echo "   Tool: $TOOL_NAME | URL: $SOURCE_URL | Type: ${{ inputs.tool_type }}"
        RESPONSE=$(curl -s -X POST "$API_URL/api/v1/audit" \
          -H "Content-Type: application/json" \
          ${API_KEY:+-H "X-API-Key: $API_KEY"} \
          -d "{\"tool_type\":\"${{ inputs.tool_type }}\",\"source_url\":\"$SOURCE_URL\",\"name\":\"$TOOL_NAME\"}")
        AUDIT_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('audit_id',''))" 2>/dev/null)
        if [ -z "$AUDIT_ID" ]; then
          echo "❌ Failed to submit audit"; echo "$RESPONSE"; exit 1
        fi
        echo "   Audit ID: $AUDIT_ID - Waiting..."
        for i in $(seq 1 30); do
          sleep 5
          RESULT=$(curl -s "$API_URL/api/v1/audit/$AUDIT_ID" ${API_KEY:+-H "X-API-Key: $API_KEY"})
          STATUS=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null)
          if [ "$STATUS" = "completed" ]; then
            SCORE=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin).get('report',{}); print(r.get('overall_score',0))" 2>/dev/null)
            RISK=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin).get('report',{}); print(r.get('risk_level','unknown'))" 2>/dev/null)
            BADGE=$(echo "$RESULT" | python3 -c "import sys,json; r=json.load(sys.stdin).get('report',{}); print(r.get('badge_level','none'))" 2>/dev/null)
            echo "✅ Score: $SCORE/100 | Risk: $RISK | Badge: $BADGE"
            echo "   Report: $API_URL/report/$AUDIT_ID"
            echo "audit_id=$AUDIT_ID" >> $GITHUB_OUTPUT
            echo "overall_score=$SCORE" >> $GITHUB_OUTPUT
            echo "risk_level=$RISK" >> $GITHUB_OUTPUT
            echo "badge_level=$BADGE" >> $GITHUB_OUTPUT
            if [ "${{ inputs.fail_on_risk }}" = "true" ] && [ "$RISK" != "safe" ]; then
              echo "❌ High risk detected"; exit 1
            fi
            exit 0
          fi
          if [ "$STATUS" = "failed" ]; then echo "❌ Audit failed"; exit 1; fi
          echo "   ... scanning ($((i*5))s)"
        done
        echo "❌ Timeout"; exit 1
