<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>审计报告 — AIShield</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--text:#e0e0e0;--dim:#888;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--yellow:#fdcb6e;--red:#e17055;--blue:#0984e3;--gold:#FFD700;--silver:#C0C0C0;--bronze:#CD7F32}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6}
a{color:var(--accent2);text-decoration:none}
.container{max-width:900px;margin:0 auto;padding:0 20px}
.header{border-bottom:1px solid var(--border);padding:16px 0}
.header .container{display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

.report{padding:30px 0}
.loading{text-align:center;padding:60px;color:var(--dim);font-size:18px}
.loading .spinner{display:inline-block;width:24px;height:24px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-right:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

.meta{display:flex;gap:20px;flex-wrap:wrap;margin-bottom:24px;padding:20px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.meta-item{flex:1;min-width:120px}
.meta-label{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.meta-value{font-size:20px;font-weight:700}
.meta-value.gold{color:var(--gold)}
.meta-value.silver{color:var(--silver)}
.meta-value.bronze{color:var(--bronze)}
.meta-value.none{color:var(--red)}
.meta-value.safe{color:var(--green)}
.meta-value.medium{color:var(--yellow)}
.meta-value.high,.meta-value.critical{color:var(--red)}

.scores{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.score-card{background:var(--card);border-radius:12px;padding:20px;text-align:center;border:1px solid var(--border)}
.score-card .label{font-size:13px;color:var(--dim);margin-bottom:8px}
.score-card .value{font-size:36px;font-weight:800}
.score-card .bar{height:4px;background:var(--border);border-radius:2px;margin-top:12px;overflow:hidden}
.score-card .bar-fill{height:100%;border-radius:2px;transition:width 0.5s}
.score-card.security .bar-fill{background:var(--green)}
.score-card.privacy .bar-fill{background:var(--blue)}
.score-card.quality .bar-fill{background:var(--accent2)}
.score-card.performance .bar-fill{background:var(--yellow)}

.section{margin-bottom:24px}
.section h2{font-size:18px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border)}

.finding{padding:12px 16px;margin-bottom:8px;background:var(--card);border-radius:8px;border-left:4px solid var(--dim)}
.finding.critical{border-left-color:var(--red)}
.finding.high{border-left-color:#e67e22}
.finding.medium{border-left-color:var(--yellow)}
.finding.low{border-left-color:var(--green)}
.finding.info{border-left-color:var(--blue)}
.finding .finding-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.finding .severity{font-size:11px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:4px}
.finding.critical .severity{background:rgba(225,112,85,.2);color:var(--red)}
.finding.high .severity{background:rgba(230,126,34,.2);color:#e67e22}
.finding.medium .severity{background:rgba(253,203,110,.2);color:var(--yellow)}
.finding.low .severity{background:rgba(0,184,148,.2);color:var(--green)}
.finding .desc{font-weight:600}
.finding .detail{font-size:13px;color:var(--dim);margin-top:4px}
.finding .evidence{font-size:12px;color:var(--dim);margin-top:4px;font-family:monospace;background:rgba(0,0,0,.3);padding:4px 8px;border-radius:4px;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.dep-list{display:flex;flex-wrap:wrap;gap:8px}
.dep-tag{padding:4px 12px;background:var(--card);border-radius:6px;font-size:13px;border:1px solid var(--border)}
.dep-tag.danger{border-color:var(--red);color:var(--red)}

.recs{padding:16px;background:var(--card);border-radius:12px;border:1px solid var(--border)}
.rec{padding:8px 0;border-bottom:1px solid var(--border)}
.rec:last-child{border-bottom:none}

.pending{text-align:center;padding:60px}
.pending .spinner{display:inline-block;width:32px;height:32px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px}
.pending p{color:var(--dim);font-size:16px}

.badge-display{display:inline-block;padding:4px 12px;border-radius:4px;font-weight:700;font-size:14px}
.badge-display.gold{background:var(--gold);color:#000}
.badge-display.silver{background:var(--silver);color:#000}
.badge-display.bronze{background:var(--bronze);color:#fff}
.badge-display.none{background:#555;color:#fff}
</style>
</head>
<body>
<div class="header"><div class="container"><a href="/" class="logo">🛡️ AIShield</a><a href="/">← 返回首页</a></div></div>
<div class="container">
<div class="report">
  <div id="reportArea"><div class="loading"><span class="spinner"></span>加载报告中...</div></div>
</div>
</div>
<script>
const auditId=location.pathname.split('/').pop();

async function loadReport(){
  try{
    const r=await fetch(`/api/v1/audit/${auditId}`);
    const d=await r.json();
    
    if(d.status==='pending'){
      document.getElementById('reportArea').innerHTML=`<div class="pending"><div class="spinner"></div><p>扫描进行中，请稍候...</p></div>`;
      setTimeout(loadReport,3000);
      return;
    }
    if(d.status==='failed'){
      document.getElementById('reportArea').innerHTML=`<div class="section"><h2>❌ 审计失败</h2><p>${esc(d.error||'未知错误')}</p></div>`;
      return;
    }
    
    let html='';
    
    // Meta
    const badge=d.badge_level||'none';
    const badgeEmoji=badge==='gold'?'🥇':badge==='silver'?'🥈':badge==='bronze'?'🥉':'⚠️';
    html+=`<div class="meta">
      <div class="meta-item"><div class="meta-label">工具名称</div><div class="meta-value">${esc(d.name||'?')}</div></div>
      <div class="meta-item"><div class="meta-label">类型</div><div class="meta-value">${esc(d.tool_type||'?')}</div></div>
      <div class="meta-item"><div class="meta-label">风险等级</div><div class="meta-value ${d.risk_level||''}">${esc(d.risk_level||'?')}</div></div>
      <div class="meta-item"><div class="meta-label">徽章</div><div class="meta-value"><span class="badge-display ${badge}">${badgeEmoji} ${badge.toUpperCase()}</span></div></div>
    </div>`;
    
    // Scores
    html+=`<div class="scores">
      <div class="score-card security"><div class="label">🛡️ 安全</div><div class="value">${d.security_score||0}</div><div class="bar"><div class="bar-fill" style="width:${d.security_score||0}%"></div></div></div>
      <div class="score-card privacy"><div class="label">🔒 隐私</div><div class="value">${d.privacy_score||0}</div><div class="bar"><div class="bar-fill" style="width:${d.privacy_score||0}%"></div></div></div>
      <div class="score-card quality"><div class="label">✨ 质量</div><div class="value">${d.quality_score||0}</div><div class="bar"><div class="bar-fill" style="width:${d.quality_score||0}%"></div></div></div>
      <div class="score-card performance"><div class="label">⚡ 性能</div><div class="value">${d.performance_score||0}</div><div class="bar"><div class="bar-fill" style="width:${d.performance_score||0}%"></div></div></div>
    </div>`;
    
    // Findings
    const findings=d.findings||[];
    if(findings.length){
      html+=`<div class="section"><h2>🔍 发现问题 (${findings.length})</h2>`;
      const sorted=[...findings].sort((a,b)=>{
        const order={critical:0,high:1,medium:2,low:3,info:4};
        return (order[a.severity]||5)-(order[b.severity]||5);
      });
      sorted.forEach(f=>{
        html+=`<div class="finding ${f.severity||'info'}">
          <div class="finding-header"><span class="desc">${esc(f.description||f.type||'')}</span><span class="severity">${esc(f.severity||'info')}</span></div>
          ${f.file?`<div class="detail">📄 ${esc(f.file)}${f.lines?':'+esc(f.lines):''}</div>`:''}
          ${f.evidence?`<div class="evidence">${esc(f.evidence).substring(0,120)}</div>`:''}
          ${f.detail?`<div class="detail">${esc(f.detail).substring(0,200)}</div>`:''}
        </div>`;
      });
      html+=`</div>`;
    }else{
      html+=`<div class="section"><h2>🔍 发现问题</h2><p style="color:var(--green)">✅ 未发现安全问题</p></div>`;
    }
    
    // Dependencies
    const depData=d.dependency_analysis;
    if(depData&&depData.dependencies&&depData.dependencies.length){
      html+=`<div class="section"><h2>📦 依赖 (${depData.total_dependencies})</h2><div class="dep-list">`;
      depData.dependencies.forEach(dep=>{
        const isDanger=depData.findings&&depData.findings.some(f=>f.package===dep.name);
        html+=`<span class="dep-tag ${isDanger?'danger':''}">${esc(dep.name)}@${esc(dep.version)} ${isDanger?'⚠️':''}</span>`;
      });
      html+=`</div></div>`;
    }
    
    // Semantic Analysis
    const semData=d.semantic_analysis;
    if(semData&&semData.analyzed){
      html+=`<div class="section"><h2>🧠 语义分析 (比特助手)</h2>`;
      if(semData.safe===true) html+=`<p style="color:var(--green)">✅ 语义安全</p>`;
      else if(semData.safe===false) html+=`<p style="color:var(--red)">⚠️ 检测到语义风险</p>`;
      if(semData.summary) html+=`<p style="margin-top:8px;color:var(--dim)">${esc(semData.summary)}</p>`;
      if(semData.findings&&semData.findings.length){
        semData.findings.forEach(f=>{
          html+=`<div class="finding ${f.severity||'medium'}"><div class="finding-header"><span class="desc">${esc(f.description||'')}</span><span class="severity">${esc(f.severity||'medium')}</span></div>${f.evidence?`<div class="evidence">${esc(f.evidence).substring(0,120)}</div>`:''}</div>`;
        });
      }
      html+=`</div>`;
    }
    
    // Recommendations
    if(d.recommendations&&d.recommendations.length){
      html+=`<div class="section"><h2>💡 建议</h2><div class="recs">`;
      d.recommendations.forEach(r=>{html+=`<div class="rec">${esc(r)}</div>`});
      html+=`</div></div>`;
    }
    
    // Source info
    html+=`<div class="section" style="color:var(--dim);font-size:13px">
      <p>来源: ${esc(d.source_url||'')}</p>
      ${d.commit_hash?`<p>Commit: ${esc(d.commit_hash)}</p>`:''}
      <p>审计时间: ${esc(d.timestamp||'')}</p>
      <p>审计ID: ${esc(d.audit_id||auditId)}</p>
    </div>`;
    
    document.getElementById('reportArea').innerHTML=html;
  }catch(e){
    document.getElementById('reportArea').innerHTML=`<div class="section"><h2>❌ 加载失败</h2><p>${esc(e.message)}</p></div>`;
  }
}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}

loadReport();
</script>
</body>
</html>
