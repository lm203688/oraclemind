<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>提交审计 — AIShield</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--card:#12121a;--border:#1e1e2e;--text:#e0e0e0;--dim:#888;--accent:#6c5ce7;--accent2:#a29bfe;--green:#00b894;--red:#e17055;--yellow:#fdcb6e}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;line-height:1.6}
a{color:var(--accent2);text-decoration:none}
.container{max-width:700px;margin:0 auto;padding:0 20px}
.header{border-bottom:1px solid var(--border);padding:16px 0}
.header .container{display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.form{padding:40px 0}
.form h1{font-size:28px;font-weight:800;margin-bottom:8px[SYSTEM_NOTE: Content compressed. Read the full version for needed.]    result.className='result success';
      result.innerHTML=`
        ✅ 审计完成！${badgeEmoji}<br>
        <div class="score-grid">
          <div class="score-item">综合: <span>${d.overall_score}/100</span></div>
          <div class="score-item">安全: <span>${d.security_score}/100</span></div>
          <div class="score-item">隐私: <span>${d.privacy_score}/100</span></div>
          <div class="score-item">质量: <span>${d.quality_score}/100</span></div>
        </div>
        <strong>风险:</strong> ${d.risk_level} | <strong>徽章:</strong> ${d.badge_level} | <strong>问题:</strong> ${d.findings?d.findings.length:0}个<br>
        <a href="/report/${auditId}" style="font-size:16px;font-weight:600">查看完整报告 →</a>
      `;
      document.getElementById('submitBtn').disabled=false;
      document.getElementById('submitBtn').textContent='🛡️ 开始安全审计';
    } else if(d.status==='failed'){
      result.className='result error';
      result.innerHTML=`❌ 审计失败: ${esc(d.error||'未知错误')}`;
      document.getElementById('submitBtn').disabled=false;
      document.getElementById('submitBtn').textContent='🛡️ 开始安全审计';
    } else {
      // pending, 继续轮询
      result.className='result';
      result.style.display='block';
      result.innerHTML=`⏳ 扫描中... (${pollCount * 3}秒)`;
      setTimeout(()=>pollResult(auditId, pollCount+1), 3000);
    }
  }catch(err){
    setTimeout(()=>pollResult(auditId, pollCount+1), 3000);
  }
}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=String(s);return d.innerHTML}
</script>
</body>
</html>
