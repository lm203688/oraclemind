name: AIShield Security Audit
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    name: AI Tool Security Audit
    steps:
      - uses: actions/checkout@v4
      
      - name: Run AIShield Audit
        uses: aisheild/audit-action@v1
        with:
          tool_type: 'mcp'  # mcp / skill / gpt / prompt
          source_url: ${{ github.repositoryUrl }}
          name: ${{ github.event.repository.name }}
          api_url: 'https://aishield.ai/api/v1/audit'
        
      - name: Upload Audit Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aishield-report
          path: aishield-report.json
