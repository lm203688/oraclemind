version: '3.8'

services:
  bit-assistant:
    build: .
    container_name: bit-assistant
    ports:
      - "8430:8430"
    environment:
      - AGNES_API_KEY=${AGNES_API_KEY}
      - AGENT_PORT=8430
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8430/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
