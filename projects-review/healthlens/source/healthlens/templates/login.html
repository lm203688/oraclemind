<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - HealthLens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .input-field { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); transition: border-color 0.2s; }
        .input-field:focus { border-color: #3b82f6; outline: none; }
    </style>
</head>
<body class="gradient-bg min-h-screen text-white flex items-center justify-center">
    <div class="w-full max-w-md px-4">
        <div class="text-center mb-8">
            <div class="w-12 h-12 rounded-xl bg-blue-500 flex items-center justify-center text-xl font-bold mx-auto mb-4">H</div>
            <h1 class="text-2xl font-bold">登录 HealthLens</h1>
            <p class="text-gray-400 text-sm mt-2">你的健康数据，安全聚合</p>
        </div>

        <!-- 登录表单 -->
        <div id="loginForm" class="glass rounded-xl p-6">
            <div class="mb-4">
                <label class="text-sm text-gray-400 block mb-1">手机号</label>
                <input id="phone" type="tel" placeholder="输入手机号" class="input-field w-full rounded-lg px-4 py-3 text-sm">
            </div>
            <div class="mb-6">
                <label class="text-sm text-gray-400 block mb-1">密码</label>
                <input id="password" type="password" placeholder="输入密码" class="input-field w-full rounded-lg px-4 py-3 text-sm"
                       onkeypress="if(event.key==='Enter')doLogin()">
            </div>
            <button onclick="doLogin()" class="w-full py-3 bg-blue-500 hover:bg-blue-600 rounded-lg font-medium transition">
                登录
            </button>
            <div class="flex items-center justify-between mt-4">
                <button onclick="showRegister()" class="text-sm text-blue-400 hover:text-blue-300">注册新账号</button>
                <button onclick="guestLogin()" class="text-sm text-gray-400 hover:text-gray-300">游客体验</button>
            </div>
        </div>

        <!-- 注册表单 -->
        <div id="registerForm" class="glass rounded-xl p-6 hidden">
            <div class="mb-4">
                <label class="text-sm text-gray-400 block mb-1">手机号</label>
                <input id="regPhone" type="tel" placeholder="输入手机号" class="input-field w-full rounded-lg px-4 py-3 text-sm">
            </div>
            <div class="mb-4">
                <label class="text-sm text-gray-400 block mb-1">昵称</label>
                <input id="regNickname" type="text" placeholder="你的昵称" class="input-field w-full rounded-lg px-4 py-3 text-sm">
            </div>
            <div class="mb-6">
                <label class="text-sm text-gray-400 block mb-1">密码（至少6位）</label>
                <input id="regPassword" type="password" placeholder="设置密码" class="input-field w-full rounded-lg px-4 py-3 text-sm"
                       onkeypress="if(event.key==='Enter')doRegister()">
            </div>
            <button onclick="doRegister()" class="w-full py-3 bg-blue-500 hover:bg-blue-600 rounded-lg font-medium transition">
                注册
            </button>
            <div class="text-center mt-4">
                <button onclick="showLogin()" class="text-sm text-blue-400 hover:text-blue-300">已有账号？去登录</button>
            </div>
        </div>

        <div id="message" class="mt-4 text-center text-sm hidden"></div>
    </div>

    <script>
        function showRegister() {
            document.getElementById('loginForm').classList.add('hidden');
            document.getElementById('registerForm').classList.remove('hidden');
        }
        function showLogin() {
            document.getElementById('registerForm').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
        }

        function showMessage(msg, type='error') {
            const el = document.getElementById('message');
            el.className = `mt-4 text-center text-sm ${type === 'error' ? 'text-red-400' : 'text-green-400'}`;
            el.textContent = msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        async function doLogin() {
            const phone = document.getElementById('phone').value.trim();
            const password = document.getElementById('password').value;
            if (!phone || !password) { showMessage('请填写手机号和密码'); return; }

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone, password})
                });
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/dashboard';
                } else {
                    showMessage(data.error);
                }
            } catch(e) {
                showMessage('登录失败: ' + e.message);
            }
        }

        async function doRegister() {
            const phone = document.getElementById('regPhone').value.trim();
            const nickname = document.getElementById('regNickname').value.trim();
            const password = document.getElementById('regPassword').value;
            if (!phone || !password) { showMessage('请填写手机号和密码'); return; }

            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({phone, nickname, password})
                });
                const data = await res.json();
                if (data.success) {
                    showMessage('注册成功！', 'success');
                    setTimeout(() => window.location.href = '/dashboard', 1000);
                } else {
                    showMessage(data.error);
                }
            } catch(e) {
                showMessage('注册失败: ' + e.message);
            }
        }

        async function guestLogin() {
            try {
                const res = await fetch('/api/auth/guest', {method: 'POST'});
                const data = await res.json();
                if (data.success) {
                    window.location.href = '/dashboard';
                }
            } catch(e) {
                showMessage('游客登录失败');
            }
        }

        // 检查是否已登录
        fetch('/api/auth/me').then(r=>r.json()).then(data => {
            if (data.success) window.location.href = '/dashboard';
        });
    </script>
</body>
</html>
