<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>健康面板 - HealthLens</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="manifest" href="/static/manifest.json">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; -webkit-font-smoothing: antialiased; }
        .gradient-bg { background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%); min-height: 100vh; }
        .glass { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        .glass-strong { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.15); }
        .metric-card { transition: all 0.2s; }
        .metric-card:hover { transform: translateY(-2px); background: rgba(255,255,255,0.08); }
        .metric-card:active { transform: scale(0.98); }
        .insight-severity-warning { border-left: 3px solid #f59e0b; }
        .insight-severity-danger { border-left: 3px solid #ef4444; }
        .insight-severity-info { border-left: 3px solid #3b82f6; }
        .chat-bubble { max-width: 85%; }
        .typing { animation: blink 1s infinite; }
        @keyframes blink { 0%,100% { opacity:1; } 50% { opacity:0; } }
        @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease-out; }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.6; } }
        .pulse { animation: pulse 2s infinite; }
        .health-score-ring { transition: stroke-dashoffset 1s ease-out; }
        .bottom-nav { padding-bottom: env(safe-area-inset-bottom, 0px); }
        .tab-active { color: #3b82f6; border-bottom: 2px solid #3b82f6; }
        .tab-inactive { color: #9ca3af; border-bottom: 2px solid transparent; }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
        /* Modal */
        .modal-overlay { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
        /* Alert badge */
        .alert-badge { position: absolute; top: -4px; right: -4px; min-width: 16px; height: 16px; background: #ef4444; border-radius: 8px; font-size: 10px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
    </style>
</head>
<body class="gradient-bg text-white">

<!-- 顶部导航 -->
<nav class="glass sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 py-3 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <a href="/" class="w-9 h-9 rounded-xl bg-gradient-to-br from-blue-500 to-cyan-400 flex items-center justify-center text-sm font-bold shadow-lg shadow-blue-500/20">H</a>
            <div>
                <span class="text-lg font-semibold">HealthLens</span>
                <span class="text-xs text-gray-400 ml-1 hidden sm:inline">健康全景</span>
            </div>
        </div>
        <div class="flex items-center gap-3">
            <button onclick="showShareModal()" class="w-9 h-9 rounded-lg bg-white/5 flex items-center justify-center hover:bg-white/10 transition" title="分享报告">📤</button>
            <a href="/profile" id="profileLink" class="w-9 h-9 rounded-lg bg-white/5 flex items-center justify-center hover:bg-white/10 transition hidden" title="个人中心">👤</a>
            <a href="/login" id="loginLink" class="text-sm text-gray-300 hover:text-white px-3 py-1.5 rounded-lg bg-white/5">登录</a>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto px-4 py-4 pb-24 md:pb-8">

    <!-- 健康评分 + 概览 -->
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
        <!-- 健康评分 -->
        <div class="glass-strong rounded-2xl p-5 flex flex-col items-center justify-center md:row-span-1">
            <div class="relative w-28 h-28">
                <svg class="w-28 h-28 -rotate-90" viewBox="0 0 100 100">
                    <circle cx="50" cy="50" r="42" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="8"/>
                    <circle id="scoreRing" class="health-score-ring" cx="50" cy="50" r="42" fill="none" stroke="#3b82f6" stroke-width="8" stroke-linecap="round" stroke-dasharray="264" stroke-dashoffset="264"/>
                </svg>
                <div class="absolute inset-0 flex flex-col items-center justify-center">
                    <span id="healthScore" class="text-3xl font-bold">--</span>
                    <span class="text-xs text-gray-400">健康分</span>
                </div>
            </div>
            <p id="scoreLabel" class="text-sm text-gray-400 mt-2">加载数据中...</p>
        </div>

        <!-- 统计卡片 -->
        <div class="glass rounded-xl p-4 flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-blue-500/20 flex items-center justify-center text-lg">📡</div>
            <div>
                <div class="text-gray-400 text-xs">数据来源</div>
                <div id="statSources" class="text-xl font-bold">-</div>
            </div>
        </div>
        <div class="glass rounded-xl p-4 flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-green-500/20 flex items-center justify-center text-lg">📊</div>
            <div>
                <div class="text-gray-400 text-xs">指标总数</div>
                <div id="statMetrics" class="text-xl font-bold">-</div>
            </div>
        </div>
        <div class="glass rounded-xl p-4 flex items-center gap-3">
            <div class="w-10 h-10 rounded-lg bg-yellow-500/20 flex items-center justify-center text-lg">⚠️</div>
            <div>
                <div class="text-gray-400 text-xs">异常指标</div>
                <div id="statAbnormal" class="text-xl font-bold text-yellow-400">-</div>
            </div>
        </div>
    </div>

    <!-- 告警横幅 -->
    <div id="alertBanner" class="hidden mb-6 fade-in">
        <div class="bg-red-500/10 border border-red-500/30 rounded-xl p-4 flex items-start gap-3">
            <span class="text-xl">🚨</span>
            <div class="flex-1">
                <div class="font-medium text-red-400">健康提醒</div>
                <div id="alertContent" class="text-sm text-red-300 mt-1"></div>
            </div>
            <button onclick="this.parentElement.parentElement.classList.add('hidden')" class="text-gray-400 hover:text-white">✕</button>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="grid md:grid-cols-3 gap-6">
        <!-- 左侧：趋势图 + 指标 -->
        <div class="md:col-span-2 space-y-6">
            <!-- 趋势图 -->
            <div class="glass rounded-2xl p-5">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="font-semibold">📈 指标趋势</h2>
                    <div class="flex gap-1" id="periodTabs">
                        <button onclick="setPeriod(7)" class="px-2.5 py-1 rounded-lg text-xs bg-white/10 hover:bg-white/20 transition">7天</button>
                        <button onclick="setPeriod(30)" class="px-2.5 py-1 rounded-lg text-xs bg-blue-500 transition">30天</button>
                        <button onclick="setPeriod(90)" class="px-2.5 py-1 rounded-lg text-xs bg-white/10 hover:bg-white/20 transition">90天</button>
                    </div>
                </div>
                <div class="flex gap-2 mb-4 overflow-x-auto pb-1" id="metricTabs"></div>
                <div class="h-56 md:h-72">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <!-- 指标卡片网格 -->
            <div class="glass rounded-2xl p-5">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="font-semibold">📊 全部指标</h2>
                    <select id="metricFilter" onchange="filterMetrics()" class="bg-white/5 border border-white/10 rounded-lg px-2 py-1 text-xs focus:outline-none focus:border-blue-500">
                        <option value="all">全部类型</option>
                    </select>
                </div>
                <div id="metricsGrid" class="grid grid-cols-1 sm:grid-cols-2 gap-3 max-h-96 overflow-y-auto">
                    <p class="text-gray-500 text-sm col-span-2 text-center py-8">暂无数据，请先上传健康数据</p>
                </div>
            </div>
        </div>

        <!-- 右侧：洞察 + AI -->
        <div class="space-y-6">
            <!-- 健康洞察 -->
            <div class="glass rounded-2xl p-5">
                <h2 class="font-semibold mb-4">💡 健康洞察</h2>
                <div id="insightsList" class="space-y-3 max-h-64 overflow-y-auto">
                    <p class="text-gray-500 text-sm text-center py-4">暂无洞察</p>
                </div>
            </div>

            <!-- AI对话 -->
            <div class="glass rounded-2xl p-5">
                <h2 class="font-semibold mb-4">🤖 健康问答</h2>
                <div id="chatMessages" class="space-y-3 mb-4 max-h-72 overflow-y-auto">
                    <div class="chat-bubble bg-white/5 rounded-lg px-3 py-2 text-sm text-gray-400">
                        👋 你好！我是HealthLens AI助手，可以回答关于你健康数据的问题。<br><br>试试问我：<br>• "我的血压正常吗？"<br>• "最近体重变化趋势"<br>• "给我一些健康建议"
                    </div>
                </div>
                <div class="flex gap-2">
                    <input id="chatInput" type="text" placeholder="输入问题..." 
                        class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-blue-500 transition" 
                        onkeypress="if(event.key==='Enter')sendChat()">
                    <button onclick="sendChat()" class="px-4 py-2.5 bg-blue-500 hover:bg-blue-600 rounded-xl text-sm transition active:scale-95">发送</button>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- 移动端底部导航 -->
<div class="md:hidden fixed bottom-0 left-0 right-0 glass-strong bottom-nav z-50">
    <div class="flex justify-around py-2">
        <a href="/" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-white transition px-3 py-1">
            <span class="text-lg">🏠</span><span class="text-[10px]">首页</span>
        </a>
        <a href="/upload" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-white transition px-3 py-1">
            <span class="text-lg">📤</span><span class="text-[10px]">上传</span>
        </a>
        <a href="/dashboard" class="flex flex-col items-center gap-0.5 text-blue-400 px-3 py-1">
            <span class="text-lg">📊</span><span class="text-[10px]">面板</span>
        </a>
        <a href="/profile" class="flex flex-col items-center gap-0.5 text-gray-400 hover:text-white transition px-3 py-1 relative">
            <span class="text-lg">👤</span><span class="text-[10px]">我的</span>
            <span id="mobileAlertBadge" class="alert-badge hidden">0</span>
        </a>
    </div>
</div>

<!-- 分享报告弹窗 -->
<div id="shareModal" class="fixed inset-0 z-[100] hidden">
    <div class="modal-overlay absolute inset-0" onclick="hideShareModal()"></div>
    <div class="absolute inset-4 md:inset-auto md:top-1/2 md:left-1/2 md:-translate-x-1/2 md:-translate-y-1/2 md:w-[480px] md:max-h-[80vh] glass-strong rounded-2xl p-6 overflow-y-auto fade-in">
        <div class="flex items-center justify-between mb-4">
            <h3 class="text-lg font-semibold">📤 分享健康报告</h3>
            <button onclick="hideShareModal()" class="text-gray-400 hover:text-white text-xl">✕</button>
        </div>
        <div id="sharePreview" class="bg-white/5 rounded-xl p-4 mb-4 text-sm space-y-2 max-h-60 overflow-y-auto"></div>
        <div class="space-y-3">
            <button onclick="copyReport()" class="w-full py-3 bg-blue-500 hover:bg-blue-600 rounded-xl text-sm font-medium transition active:scale-[0.98]">📋 复制报告文本</button>
            <button onclick="downloadReport()" class="w-full py-3 bg-white/5 hover:bg-white/10 rounded-xl text-sm font-medium transition active:scale-[0.98]">⬇️ 下载PDF（文本格式）</button>
            <button onclick="shareToWechat()" class="w-full py-3 bg-green-500/20 hover:bg-green-500/30 text-green-400 rounded-xl text-sm font-medium transition active:scale-[0.98]">💬 发送给微信好友</button>
        </div>
    </div>
</div>

<script>
    let currentMetrics = [];
    let trendChart = null;
    let currentUserId = 'default';
    let currentPeriod = 30;
    let currentMetricType = null;
    let dashboardData = null;

    // 检查登录状态
    async function checkAuth() {
        try {
            const res = await fetch('/api/auth/me');
            const data = await res.json();
            if (data.success) {
                currentUserId = data.user.id;
                document.getElementById('profileLink')?.classList.remove('hidden');
                document.getElementById('loginLink')?.classList.add('hidden');
            }
        } catch(e) {}
    }

    async function loadDashboard() {
        try {
            const res = await fetch(`/api/dashboard/${currentUserId}`);
            const data = await res.json();
            if (!data.success) return;
            dashboardData = data;

            // 统计
            document.getElementById('statSources').textContent = data.sources.length;
            document.getElementById('statMetrics').textContent = data.metrics.length;
            document.getElementById('statAbnormal').textContent = data.abnormal_count;
            document.getElementById('statInsights') && (document.getElementById('statInsights').textContent = data.insights.length);

            // 健康评分
            const score = calculateHealthScore(data);
            animateScore(score);

            // 告警
            if (data.abnormal_count > 0) {
                const abnormalMetrics = data.metrics.filter(m => {
                    const meta = m.metadata_json ? JSON.parse(m.metadata_json) : {};
                    return meta.status === 'high' || meta.status === 'low';
                });
                document.getElementById('alertContent').textContent = 
                    `发现 ${data.abnormal_count} 项异常指标：${abnormalMetrics.map(m => m.metric_name).join('、')}`;
                document.getElementById('alertBanner').classList.remove('hidden');
                const badge = document.getElementById('mobileAlertBadge');
                if (badge) { badge.textContent = data.abnormal_count; badge.classList.remove('hidden'); }
            }

            // 指标
            currentMetrics = data.metrics;
            renderMetrics(data.metrics);
            renderMetricTabs(data.metrics);
            renderInsights(data.insights);
        } catch (e) {
            console.error('加载失败:', e);
        }
    }

    function calculateHealthScore(data) {
        if (!data.metrics.length) return 0;
        let score = 100;
        data.metrics.forEach(m => {
            const meta = m.metadata_json ? JSON.parse(m.metadata_json) : {};
            if (meta.status === 'high') score -= 8;
            if (meta.status === 'low') score -= 5;
        });
        return Math.max(0, Math.min(100, score));
    }

    function animateScore(target) {
        const ring = document.getElementById('scoreRing');
        const label = document.getElementById('scoreLabel');
        const scoreEl = document.getElementById('healthScore');
        
        const circumference = 264;
        const offset = circumference - (target / 100) * circumference;
        ring.style.strokeDashoffset = offset;
        
        // Color based on score
        const color = target >= 80 ? '#22c55e' : target >= 60 ? '#f59e0b' : '#ef4444';
        ring.style.stroke = color;
        
        // Animate number
        let current = 0;
        const step = target / 30;
        const timer = setInterval(() => {
            current += step;
            if (current >= target) { current = target; clearInterval(timer); }
            scoreEl.textContent = Math.round(current);
        }, 30);
        
        if (target === 0) label.textContent = '上传数据开始评估';
        else if (target >= 90) label.textContent = '状态优秀 🎉';
        else if (target >= 80) label.textContent = '状态良好 👍';
        else if (target >= 60) label.textContent = '需要关注 ⚠️';
        else label.textContent = '建议就医 🏥';
    }

    function renderMetrics(metrics) {
        const el = document.getElementById('metricsGrid');
        if (!metrics.length) {
            el.innerHTML = '<p class="text-gray-500 text-sm col-span-2 text-center py-8">暂无数据，请先上传健康数据</p>';
            return;
        }
        el.innerHTML = metrics.map(m => {
            const meta = m.metadata_json ? JSON.parse(m.metadata_json) : {};
            const status = meta.status || 'normal';
            const statusColor = status === 'high' ? 'text-red-400 bg-red-500/10' : status === 'low' ? 'text-blue-400 bg-blue-500/10' : 'text-green-400 bg-green-500/10';
            const statusIcon = status === 'high' ? '↑偏高' : status === 'low' ? '↓偏低' : '✓正常';
            const statusBorder = status === 'high' ? 'border-red-500/20' : status === 'low' ? 'border-blue-500/20' : 'border-green-500/20';
            return `<div class="metric-card bg-white/5 rounded-xl p-3 border ${statusBorder} cursor-pointer" onclick="showMetricDetail('${m.metric_name}')">
                <div class="flex items-center justify-between mb-1">
                    <span class="text-sm font-medium">${m.metric_name}</span>
                    <span class="text-[10px] px-1.5 py-0.5 rounded ${statusColor}">${statusIcon}</span>
                </div>
                <div class="text-lg font-bold">${m.value} <span class="text-xs text-gray-400 font-normal">${m.unit}</span></div>
                <div class="text-[10px] text-gray-500 mt-1">${m.metric_type} · ${m.recorded_at} · ${m.source}</div>
            </div>`;
        }).join('');

        // Update filter
        const types = [...new Set(metrics.map(m => m.metric_type))];
        const filter = document.getElementById('metricFilter');
        filter.innerHTML = '<option value="all">全部类型</option>' + types.map(t => `<option value="${t}">${t}</option>`).join('');
    }

    function filterMetrics() {
        const type = document.getElementById('metricFilter').value;
        const filtered = type === 'all' ? currentMetrics : currentMetrics.filter(m => m.metric_type === type);
        renderMetrics(filtered);
    }

    function renderMetricTabs(metrics) {
        const types = [...new Set(metrics.map(m => m.metric_type))];
        const el = document.getElementById('metricTabs');
        el.innerHTML = types.map((t, i) =>
            `<button onclick="showTrend('${t}')" class="px-3 py-1.5 rounded-lg text-xs whitespace-nowrap ${i === 0 ? 'bg-blue-500' : 'bg-white/10 hover:bg-white/20'} transition">${t}</button>`
        ).join('');
        if (types.length > 0) { currentMetricType = types[0]; showTrend(types[0]); }
    }

    function setPeriod(days) {
        currentPeriod = days;
        document.querySelectorAll('#periodTabs button').forEach((btn, i) => {
            const periods = [7, 30, 90];
            btn.className = `px-2.5 py-1 rounded-lg text-xs transition ${periods[i] === days ? 'bg-blue-500' : 'bg-white/10 hover:bg-white/20'}`;
        });
        if (currentMetricType) showTrend(currentMetricType);
    }

    function showTrend(type) {
        currentMetricType = type;
        // Update tab styles
        document.querySelectorAll('#metricTabs button').forEach(btn => {
            btn.className = btn.textContent === type 
                ? 'px-3 py-1.5 rounded-lg text-xs whitespace-nowrap bg-blue-500 transition'
                : 'px-3 py-1.5 rounded-lg text-xs whitespace-nowrap bg-white/10 hover:bg-white/20 transition';
        });

        const filtered = currentMetrics.filter(m => m.metric_type === type);
        const byName = {};
        filtered.forEach(m => {
            if (!byName[m.metric_name]) byName[m.metric_name] = [];
            byName[m.metric_name].push(m);
        });

        const colors = ['#3b82f6', '#22c55e', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4'];
        const datasets = Object.entries(byName).map(([name, records], i) => ({
            label: name,
            data: records.map(r => ({x: r.recorded_at, y: r.value})),
            borderColor: colors[i % colors.length],
            backgroundColor: colors[i % colors.length] + '20',
            fill: true,
            tension: 0.4,
            pointRadius: 4,
            pointHoverRadius: 6,
            borderWidth: 2,
        }));

        if (trendChart) trendChart.destroy();
        trendChart = new Chart(document.getElementById('trendChart'), {
            type: 'line',
            data: { datasets },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                interaction: { mode: 'index', intersect: false },
                scales: {
                    x: { type: 'category', labels: [...new Set(filtered.map(m => m.recorded_at))], ticks: {color: '#9ca3af', maxTicksLimit: 8, font: {size: 10}}, grid: {color: 'rgba(255,255,255,0.03)'} },
                    y: { ticks: {color: '#9ca3af', font: {size: 10}}, grid: {color: 'rgba(255,255,255,0.05)'} }
                },
                plugins: { 
                    legend: { labels: {color: '#d1d5db', usePointStyle: true, pointStyle: 'circle', font: {size: 11}} },
                    tooltip: { backgroundColor: 'rgba(15,23,42,0.9)', titleColor: '#fff', bodyColor: '#d1d5db', borderColor: 'rgba(255,255,255,0.1)', borderWidth: 1, cornerRadius: 8, padding: 10 }
                }
            }
        });
    }

    function showMetricDetail(name) {
        const records = currentMetrics.filter(m => m.metric_name === name);
        if (!records.length) return;
        const m = records[0];
        const meta = m.metadata_json ? JSON.parse(m.metadata_json) : {};
        const status = meta.status || 'normal';
        
        // Show in chat
        const chatEl = document.getElementById('chatMessages');
        const detail = `📊 ${m.metric_name} 详情\n` +
            `当前值: ${m.value} ${m.unit}\n` +
            `状态: ${status === 'high' ? '偏高 ⚠️' : status === 'low' ? '偏低 ⚠️' : '正常 ✅'}\n` +
            `类型: ${m.metric_type}\n` +
            `日期: ${m.recorded_at}\n` +
            `来源: ${m.source}\n` +
            `记录数: ${records.length}`;
        
        chatEl.innerHTML += `<div class="chat-bubble bg-blue-500/20 rounded-lg px-3 py-2 text-sm ml-auto whitespace-pre-line">${detail}</div>`;
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    function renderInsights(insights) {
        const el = document.getElementById('insightsList');
        if (!insights.length) {
            el.innerHTML = '<p class="text-gray-500 text-sm text-center py-4">暂无洞察，上传更多数据后AI将自动分析</p>';
            return;
        }
        el.innerHTML = insights.map(i => {
            const sevClass = i.severity === 'warning' ? 'insight-severity-warning' : i.severity === 'danger' ? 'insight-severity-danger' : 'insight-severity-info';
            const icon = i.severity === 'warning' ? '⚠️' : i.severity === 'danger' ? '🔴' : '💡';
            return `<div class="${sevClass} bg-white/5 rounded-lg p-3 fade-in">
                <div class="text-sm font-medium mb-1">${icon} ${i.title}</div>
                <div class="text-xs text-gray-400">${i.content}</div>
            </div>`;
        }).join('');
    }

    async function sendChat() {
        const input = document.getElementById('chatInput');
        const msg = input.value.trim();
        if (!msg) return;
        input.value = '';

        const chatEl = document.getElementById('chatMessages');
        chatEl.innerHTML += `<div class="chat-bubble bg-blue-500/20 rounded-xl px-3 py-2 text-sm ml-auto">${msg}</div>`;
        chatEl.innerHTML += `<div id="chatTyping" class="chat-bubble bg-white/5 rounded-xl px-3 py-2 text-sm text-gray-400"><span class="typing">⏳</span> 思考中...</div>`;
        chatEl.scrollTop = chatEl.scrollHeight;

        try {
            const res = await fetch('/api/ask', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: currentUserId, question: msg})
            });
            const data = await res.json();
            document.getElementById('chatTyping')?.remove();
            if (data.success) {
                chatEl.innerHTML += `<div class="chat-bubble bg-white/5 rounded-xl px-3 py-2 text-sm whitespace-pre-line">${data.answer}</div>`;
            } else {
                chatEl.innerHTML += `<div class="chat-bubble bg-red-500/10 rounded-xl px-3 py-2 text-sm text-red-400">${data.error}</div>`;
            }
        } catch (e) {
            document.getElementById('chatTyping')?.remove();
            chatEl.innerHTML += `<div class="chat-bubble bg-red-500/10 rounded-xl px-3 py-2 text-sm text-red-400">请求失败</div>`;
        }
        chatEl.scrollTop = chatEl.scrollHeight;
    }

    // ============ 分享报告 ============
    function showShareModal() {
        if (!dashboardData) return;
        const preview = generateReport();
        document.getElementById('sharePreview').innerHTML = preview.replace(/\n/g, '<br>');
        document.getElementById('shareModal').classList.remove('hidden');
    }

    function hideShareModal() {
        document.getElementById('shareModal').classList.add('hidden');
    }

    function generateReport() {
        const d = dashboardData;
        const score = calculateHealthScore(d);
        const now = new Date().toLocaleString('zh-CN');
        let report = `🧬 HealthLens 健康报告\n`;
        report += `━━━━━━━━━━━━━━━━━━\n`;
        report += `📅 生成时间: ${now}\n`;
        report += `💯 健康评分: ${score}/100\n`;
        report += `📡 数据来源: ${d.sources.length}个\n`;
        report += `📊 指标总数: ${d.metrics.length}项\n`;
        report += `⚠️ 异常指标: ${d.abnormal_count}项\n\n`;

        if (d.metrics.length) {
            report += `📋 指标详情\n`;
            report += `━━━━━━━━━━━━━━━━━━\n`;
            const byType = {};
            d.metrics.forEach(m => {
                if (!byType[m.metric_type]) byType[m.metric_type] = [];
                byType[m.metric_type].push(m);
            });
            Object.entries(byType).forEach(([type, metrics]) => {
                report += `\n【${type}】\n`;
                metrics.forEach(m => {
                    const meta = m.metadata_json ? JSON.parse(m.metadata_json) : {};
                    const flag = meta.status === 'high' ? '↑偏高' : meta.status === 'low' ? '↓偏低' : '';
                    report += `  ${m.metric_name}: ${m.value} ${m.unit} ${flag} (${m.recorded_at})\n`;
                });
            });
        }

        if (d.insights.length) {
            report += `\n💡 AI洞察\n`;
            report += `━━━━━━━━━━━━━━━━━━\n`;
            d.insights.forEach(i => {
                report += `• ${i.title}: ${i.content}\n`;
            });
        }

        report += `\n━━━━━━━━━━━━━━━━━━\n`;
        report += `⚠️ 本报告由HealthLens AI生成，仅供参考，不能替代医疗诊断。\n`;
        report += `🔗 http://150.158.119.19:8432`;
        return report;
    }

    function copyReport() {
        const report = generateReport();
        navigator.clipboard.writeText(report).then(() => {
            showToast('报告已复制到剪贴板');
        }).catch(() => {
            // Fallback
            const ta = document.createElement('textarea');
            ta.value = report;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            showToast('报告已复制到剪贴板');
        });
    }

    function downloadReport() {
        const report = generateReport();
        const blob = new Blob([report], {type: 'text/plain;charset=utf-8'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `HealthLens_健康报告_${new Date().toISOString().slice(0,10)}.txt`;
        a.click();
        URL.revokeObjectURL(url);
        showToast('报告已下载');
    }

    function shareToWechat() {
        const report = generateReport();
        if (navigator.share) {
            navigator.share({ title: 'HealthLens健康报告', text: report }).catch(() => {});
        } else {
            copyReport();
            showToast('已复制，可粘贴到微信发送');
        }
    }

    function showToast(msg) {
        const t = document.createElement('div');
        t.className = 'fixed top-16 left-1/2 -translate-x-1/2 bg-blue-500 text-white px-4 py-2 rounded-xl text-sm z-[200] fade-in shadow-lg';
        t.textContent = msg;
        document.body.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

    // 初始化
    checkAuth().then(() => loadDashboard());
</script>
</body>
</html>
