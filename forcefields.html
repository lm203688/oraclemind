<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>力场引擎 | 蜂群科研</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#64748b;--accent:#3b82f6;--accent2:#8b5cf6;--green:#10b981;--orange:#f59e0b;--red:#ef4444;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1140px;margin:0 auto;padding:0 24px}
.nav{background:rgba(15,23,42,0.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-size:18px;font-weight:700}
.logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:24px}
.nav-links a{color:var(--muted);font-size:14px;font-weight:500}
.nav-links a.active{color:var(--text)}
.page-header{padding:48px 0 32px}
.page-header h1{font-size:36px;font-weight:800;margin-bottom:8px}
.page-header p{color:var(--muted);font-size:16px}
.recommend-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:32px}
.recommend-title{font-size:18px;font-weight:700;margin-bottom:16px}
.system-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
.system-btn{padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:13px;cursor:pointer;text-align:center;transition:all .15s}
.system-btn:hover{border-color:var(--accent)}
.system-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.ff-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:32px}
.ff-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px;position:relative;overflow:hidden}
.ff-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
.ff-card.available::before{background:var(--green)}
.ff-card.planned::before{background:var(--orange)}
.ff-name{font-size:16px;font-weight:700;margin-bottom:4px}
.ff-id{font-family:monospace;font-size:12px;color:var(--accent);margin-bottom:8px}
.ff-desc{font-size:13px;color:var(--muted);margin-bottom:12px}
.ff-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ff-stat{font-size:12px}
.ff-stat-label{color:var(--muted)}
.ff-stat-value{font-weight:600}
.ff-status{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-top:8px}
.ff-status.available{background:rgba(16,185,129,0.15);color:var(--green)}
.ff-status.planned{background:rgba(245,158,11,0.15);color:var(--orange)}
.compare-panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:32px}
.input-group{margin-bottom:12px}
.input-label{font-size:13px;color:var(--muted);display:block;margin-bottom:4px}
.input-field{padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px;width:100%}
.btn{padding:10px 24px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
.compare-result{margin-top:16px}
.compare-row{display:grid;grid-template-columns:120px 1fr 1fr 1fr 1fr;gap:8px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.compare-row.header{font-weight:600;color:var(--muted);font-size:12px;text-transform:uppercase}
.compare-row.winner{background:rgba(16,185,129,0.05);border-radius:6px;padding:8px}
.footer{border-top:1px solid var(--border);padding:32px 0;text-align:center;color:var(--muted);font-size:13px}
</style>
</head>
<body>

<nav class="nav">
<div class="container nav-inner">
<div class="logo">🐝 <span>蜂群科研</span></div>
<div class="nav-links">
<a href="index.html">首页</a>
<a href="quantum.html">量子计算</a>
<a href="md.html">分子动力学</a>
<a href="ml-predict.html">ML预测</a>
<a href="materials.html">材料数据库</a>
<a href="engines.html">材料预测</a>
<a href="forcefields.html" class="active">力场引擎</a>
<a href="report.html">报告</a>
<a href="visualization.html">可视化</a>
<a href="api-playground.html">API测试</a>
<a href="docs.html">API文档</a>
</div>
</div>
</nav>

<div class="container">
<div class="page-header">
<h1>⚙️ 力场引擎</h1>
<p>8种力场数据库 + 推荐引擎 + 多力场对比——力场选择是计算化学的核心决策</p>
</div>

<div class="recommend-panel">
<div class="recommend-title">🎯 力场推荐引擎</div>
<p style="font-size:13px;color:var(--muted);margin-bottom:16px">选择你的体系类型，自动推荐最佳力场</p>
<div class="system-grid">
<button class="system-btn" onclick="recommend('药物')">💊 药物分子</button>
<button class="system-btn" onclick="recommend('蛋白质')">🧬 蛋白质</button>
<button class="system-btn" onclick="recommend('核酸')">🔗 核酸</button>
<button class="system-btn" onclick="recommend('MOF')">🏗️ MOF材料</button>
<button class="system-btn" onclick="recommend('材料')">🧱 材料</button>
<button class="system-btn" onclick="recommend('反应')">🔥 反应路径</button>
<button class="system-btn" onclick="recommend('水')">💧 水溶液</button>
<button class="system-btn" onclick="recommend('有机分子')">⚗️ 有机分子</button>
<button class="system-btn" onclick="recommend('无机')">🪨 无机物</button>
<button class="system-btn" onclick="recommend('通用')">📋 通用</button>
</div>
<div id="recommend-result" style="margin-top:16px"></div>
</div>

<h2 style="font-size:22px;font-weight:700;margin-bottom:16px">📋 力场数据库（8种）</h2>
<div class="ff-grid" id="ff-grid"></div>

<div class="compare-panel">
<div class="recommend-title">⚖️ 多力场对比</div>
<p style="font-size:13px;color:var(--muted);margin-bottom:16px">同一分子用不同力场计算，对比能量和稳定性</p>
<div class="input-group">
<label class="input-label">分子SMILES</label>
<input class="input-field" id="compare-smiles" value="CCO" style="font-family:monospace">
</div>
<button class="btn" onclick="runCompare()">开始对比</button>
<div class="compare-result" id="compare-result"></div>
</div>

</div>

<footer class="footer"><div class="container"><p>蜂群科研 — 力场引擎 | 8种力场+推荐+对比</p></div></footer>

<script>
const API_BASE = 'http://150.158.119.19:8461';

const FORCEFIELDS = [
  {id:'mmff94',name:'MMFF94',desc:'有机小分子标准力场（药物/化学品）',accuracy:'±5%',speed:'快',engine:'RDKit',max_atoms:500,available:true,suitable:['有机分子','药物','小分子']},
  {id:'mmff94s',name:'MMFF94s',desc:'MMFF94静态版——构型优化更精确',accuracy:'±4%',speed:'快',engine:'RDKit',max_atoms:500,available:true,suitable:['有机分子','构型优化']},
  {id:'uff',name:'UFF',desc:'通用力场——支持全周期表元素',accuracy:'±10%',speed:'快',engine:'RDKit',max_atoms:500,available:true,suitable:['金属','MOF','材料','无机']},
  {id:'gaff',name:'GAFF',desc:'通用有机分子力场（比MMFF94精确）',accuracy:'±3%',speed:'中',engine:'OpenMM',max_atoms:5000,available:false,suitable:['有机分子','药物']},
  {id:'amber14',name:'AMBER ff14SB',desc:'蛋白质/核酸标准力场',accuracy:'±2%',speed:'中',engine:'OpenMM',max_atoms:10000,available:false,suitable:['蛋白质','核酸','DNA','RNA']},
  {id:'charmm36',name:'CHARMM36',desc:'生物分子/膜脂力场',accuracy:'±2%',speed:'中',engine:'OpenMM',max_atoms:10000,available:false,suitable:['生物分子','膜','脂质']},
  {id:'tip3p',name:'TIP3P',desc:'水分子专用力场',accuracy:'专精',speed:'快',engine:'OpenMM',max_atoms:100000,available:false,suitable:['水','溶剂']},
  {id:'reaxff',name:'ReaxFF',desc:'反应力场——模拟化学键断裂/形成',accuracy:'±5%',speed:'慢',engine:'LAMMPS',max_atoms:1000,available:false,suitable:['反应','催化','燃烧']},
];

// 渲染力场卡片
const grid = document.getElementById('ff-grid');
FORCEFIELDS.forEach(ff => {
  const card = document.createElement('div');
  card.className = `ff-card ${ff.available ? 'available' : 'planned'}`;
  card.innerHTML = `
    <div class="ff-name">${ff.name}</div>
    <div class="ff-id">${ff.id}</div>
    <div class="ff-desc">${ff.desc}</div>
    <div class="ff-stats">
      <div class="ff-stat"><div class="ff-stat-label">精度</div><div class="ff-stat-value" style="color:${ff.accuracy.includes('1')||ff.accuracy.includes('2')?'var(--green)':ff.accuracy.includes('5')?'var(--orange)':'var(--red)'}">${ff.accuracy}</div></div>
      <div class="ff-stat"><div class="ff-stat-label">速度</div><div class="ff-stat-value">${ff.speed}</div></div>
      <div class="ff-stat"><div class="ff-stat-label">引擎</div><div class="ff-stat-value">${ff.engine}</div></div>
      <div class="ff-stat"><div class="ff-stat-label">最大原子数</div><div class="ff-stat-value">${ff.max_atoms}</div></div>
    </div>
    <span class="ff-status ${ff.available ? 'available' : 'planned'}">${ff.available ? '✅ 可用' : '📋 待实现'}</span>
  `;
  grid.appendChild(card);
});

// 力场推荐
async function recommend(system) {
  document.querySelectorAll('.system-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  
  try {
    const resp = await fetch(`${API_BASE}/api/v1/md/recommend_forcefield?system=${encodeURIComponent(system)}`);
    const d = await resp.json();
    
    const html = d.recommended.map((r, i) => `
      <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border)">
        <span style="font-size:20px">${i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'}</span>
        <div style="flex:1">
          <strong>${r.name}</strong> <span style="color:var(--muted);font-size:12px">${r.id}</span>
          <div style="font-size:12px;color:var(--muted)">${r.desc}</div>
        </div>
        <div style="text-align:right">
          <div style="font-weight:600;color:${r.accuracy.includes('2')?'var(--green)':r.accuracy.includes('5')?'var(--orange)':'var(--muted)'}">${r.accuracy}</div>
          <span class="ff-status ${r.available ? 'available' : 'planned'}">${r.available ? '✅可用' : '📋待实现'}</span>
        </div>
      </div>
    `).join('');
    
    document.getElementById('recommend-result').innerHTML = `<div style="background:var(--bg);border-radius:8px;padding:12px">${html}</div>`;
  } catch(e) {
    document.getElementById('recommend-result').innerHTML = `<div style="color:var(--red)">API连接失败</div>`;
  }
}

// 多力场对比
async function runCompare() {
  const smiles = document.getElementById('compare-smiles').value.trim();
  if (!smiles) return;
  
  document.getElementById('compare-result').innerHTML = '<div style="color:var(--muted)">对比中...</div>';
  
  try {
    const resp = await fetch(`${API_BASE}/api/v1/md/compare_forcefields`, {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({smiles})
    });
    const d = await resp.json();
    
    if (d.status !== 'success') {
      document.getElementById('compare-result').innerHTML = `<div style="color:var(--red)">${d.error||'失败'}</div>`;
      return;
    }
    
    let html = '<div class="compare-row header"><div>力场</div><div>能量(kcal/mol)</div><div>精度</div><div>耗时(s)</div><div></div></div>';
    
    d.results.forEach(r => {
      if (r.error) {
        html += `<div class="compare-row"><div>${r.name}</div><div colspan="4" style="color:var(--red)">${r.error}</div></div>`;
      } else {
        const isWinner = d.most_stable && d.most_stable.forcefield === r.forcefield;
        html += `<div class="compare-row ${isWinner ? 'winner' : ''}">
          <div><strong>${r.name}</strong>${isWinner ? ' 🏆' : ''}</div>
          <div>${r.energy_final.toFixed(3)}</div>
          <div>${r.accuracy}</div>
          <div>${r.elapsed.toFixed(2)}</div>
          <div></div>
        </div>`;
      }
    });
    
    if (d.most_stable) {
      html += `<div style="margin-top:12px;padding:12px;background:rgba(16,185,129,0.1);border-radius:8px;color:var(--green);font-size:13px">
        🏆 最稳定构型: <strong>${d.most_stable.name}</strong> (能量: ${d.most_stable.energy.toFixed(3)} kcal/mol)
      </div>`;
    }
    
    document.getElementById('compare-result').innerHTML = html;
  } catch(e) {
    document.getElementById('compare-result').innerHTML = `<div style="color:var(--red)">API连接失败</div>`;
  }
}
</script>
</body>
</html>
