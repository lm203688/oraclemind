version: '3.8'

services:
  atex:
    build: .
    image: atex/server:latest
    container_name: atex-server
    ports:
      - "8420:8420"
    environment:
      - ATEX_HOST=0.0.0.0
      - ATEX_PORT=8420
    volumes:
      - atex-data:/app/data
      - atex-config:/app/config.json
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8420/api/v1/status')"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  atex-data:
  atex-config:
