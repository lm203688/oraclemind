<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>违禁词检测 - 发帖前必查 | ATEX</title>
<meta name="description" content="免费检测中文违禁词、敏感词，支持抖音/小红书/微信/微博/B站/快手6大平台。1毛钱1次，发帖前必用工具。">
<meta name="keywords" content="违禁词检测,敏感词查询,广告法合规,抖音违禁词,小红书违禁词,内容审核">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB',sans-serif;background:#0a0a0a;color:#e0e0e0;min-height:100vh}
.container{max-width:720px;margin:0 auto;padding:20px}
header{text-align:center;padding:30px 0 20px}
header h1{font-size:28px;background:linear-gradient(135deg,#ff6b6b,#ffa500);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
header p{color:#888;font-size:14px}
.badge{display:inline-block;background:#ff4444;color:#fff;font-size:11px;padding:2px 8px;border-radius:10px;margin-left:6px;vertical-align:middle}
.platform-bar{display:flex;gap:8px;margin:16px 0;flex-wrap:wrap;justify-content:center}
.platform-btn{padding:8px 16px;border:1px solid #333;border-radius:20px;background:transparent;color:#aaa;cursor:pointer;font-size:13px;transition:all .2s}
.platform-btn.active{border-color:#ff6b6b;color:#ff6b6b;background:rgba(255,107,107,.1)}
.platform-btn:hover{border-color:#ff6b6b;color:#ff6b6b}
.textarea-wrap{position:relative;margin:12px 0}
textarea{width:100%;height:120px;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#e0e0e0;padding:14px;font-size:15px;resize:vertical;outline:none;transition:border-color .2s}
textarea:focus{border-color:#ff6b6b}
textarea::placeholder{color:#555}
.char-count{position:absolute;bottom:10px;right:14px;color:#555;font-size:12px}
.check-btn{width:100%;padding:14px;background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;border:none;border-radius:12px;font-size:16px;font-weight:600;cursor:pointer;transition:all .2s;margin:12px 0}
.check-btn:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(255,107,107,.3)}
.check-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;box-shadow:none}
.result-area{margin-top:20px;display:none}
.result-area.show{display:block}
.stats-bar{display:flex;gap:12px;margin:12px 0;flex-wrap:wrap}
.stat{flex:1;min-width:80px;padding:10px;background:#1a1a1a;border-radius:10px;text-align:center}
.stat .num{font-size:24px;font-weight:700}
.stat .label{font-size:11px;color:#888;margin-top:2px}
.stat.high .num{color:#ff4444}
.stat.mid .num{color:#ffa500}
.stat.low .num{color:#4ecdc4}
.stat.tip .num{color:#888}
.issue-list{margin:12px 0}
.issue-card{background:#1a1a1a;border-radius:10px;padding:14px;margin:8px 0;border-left:3px solid #ff4444}
.issue-card.mid-level{border-left-color:#ffa500}
.issue-card.low-level{border-left-color:#4ecdc4}
.issue-card .keyword{font-size:16px;font-weight:600;color:#ff6b6b}
.issue-card.mid-level .keyword{color:#ffa500}
.issue-card.low-level .keyword{color:#4ecdc4}
.issue-card .category{font-size:12px;color:#888;margin:4px 0}
.issue-card .law{font-size:12px;color:#666}
.issue-card .fine{font-size:13px;color:#ff4444;font-weight:600;margin:4px 0}
.issue-card .suggestion{font-size:12px;color:#4ecdc4;margin-top:6px}
.issue-card .suggestion span{background:rgba(78,205,196,.1);padding:2px 8px;border-radius:4px;margin:2px;display:inline-block}
.seo-card{background:#1a1a1a;border-radius:10px;padding:14px;margin:8px 0;border-left:3px solid #4ecdc4}
.seo-card .level{font-size:12px;color:#4ecdc4;font-weight:600}
.seo-card .message{font-size:13px;color:#aaa;margin-top:4px}
.remaining{font-size:12px;color:#666;text-align:center;margin:12px 0}
.cta-box{background:linear-gradient(135deg,rgba(255,107,107,.1),rgba(255,142,83,.1));border:1px solid rgba(255,107,107,.3);border-radius:12px;padding:20px;margin:20px 0;text-align:center}
.cta-box h3{color:#ff6b6b;font-size:16px;margin-bottom:8px}
.cta-box p{color:#aaa;font-size:13px;margin-bottom:12px}
.cta-box a{display:inline-block;padding:10px 24px;background:linear-gradient(135deg,#ff6b6b,#ff8e53);color:#fff;border-radius:8px;text-decoration:none;font-weight:600;font-size:14px}
.footer{text-align:center;padding:20px 0;color:#444;font-size:12px}
.footer a{color:#666;text-decoration:none}
.loading{display:none;text-align:center;padding:20px}
.loading.show{display:block}
.spinner{width:30px;height:30px;border:3px solid #333;border-top-color:#ff6b6b;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px}
@keyframes spin{to{transform:rotate(360deg)}}
.example-btns{display:flex;gap:8px;margin:8px 0;flex-wrap:wrap;justify-content:center}
.example-btn{padding:6px 12px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#888;font-size:12px;cursor:pointer;transition:all .2s}
.example-btn:hover{border-color:#ff6b6b;color:#ff6b6b}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>🛡️ 违禁词检测 <span class="badge">1毛/次</span></h1>
    <p>发帖前必查 · 6大平台 · 广告法合规 · 罚款预警</p>
  </header>

  <div class="platform-bar">
    <button class="platform-btn active" data-p="douyin">抖音</button>
    <button class="platform-btn" data-p="xiaohongshu">小红书</button>
    <button class="platform-btn" data-p="wechat">微信</button>
    <button class="platform-btn" data-p="weibo">微博</button>
    <button class="platform-btn" data-p="bilibili">B站</button>
    <button class="platform-btn" data-p="kuaishou">快手</button>
  </div>

  <div class="example-btns">
    <button class="example-btn" data-text="这个产品最牛逼全网第一绝无仅有买它买它">绝对化用语</button>
    <button class="example-btn" data-text="3天瘦10斤不反弹无效退款轻松月入过万">虚假宣传</button>
    <button class="example-btn" data-text="国家级名医用祖传秘方根治各种疑难杂症">医疗违规</button>
  </div>

  <div class="textarea-wrap">
    <textarea id="inputText" placeholder="粘贴你的文案，检测违禁词和敏感词..."></textarea>
    <span class="char-count"><span id="charNum">0</span>字</span>
  </div>

  <button class="check-btn" id="checkBtn" onclick="doCheck()">🔍 免费检测</button>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>正在检测中...</p>
  </div>

  <div class="result-area" id="resultArea">
    <div class="stats-bar" id="statsBar"></div>
    <div class="issue-list" id="issueList"></div>
    <div class="remaining" id="remaining"></div>
  </div>

  <div class="cta-box">
    <h3>⚡ 解锁Pro版</h3>
    <p>更多检测次数 · 行业定制词库 · 批量检测 · API接入</p>
    <a href="https://genetech.tools/credits" target="_blank">立即充值 →</a>
  </div>

  <div class="footer">
    <p>Powered by <a href="http://150.158.119.19:8420/" target="_blank">ATEX</a> · <a href="https://genetech.tools/" target="_blank">GeneTech</a></p>
  </div>
</div>

<script>
const API='http://150.158.119.19:8420/mcp';
let apiKey='';
let platform='douyin';
let remaining=5;

// Platform buttons
document.querySelectorAll('.platform-btn').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('.platform-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    platform=b.dataset.p;
  };
});

// Example buttons
document.querySelectorAll('.example-btn').forEach(b=>{
  b.onclick=()=>{
    document.getElementById('inputText').value=b.dataset.text;
    document.getElementById('charNum').textContent=b.dataset.text.length;
  };
});

// Char count
document.getElementById('inputText').oninput=function(){
  document.getElementById('charNum').textContent=this.value.length;
};

async function register(){
  const r=await fetch(API.replace('/mcp','/v1/register'),{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name:'demo_'+Date.now()})
  });
  const d=await r.json();
  apiKey=d.api_key;
}

async function doCheck(){
  const text=document.getElementById('inputText').value.trim();
  if(!text){alert('请输入要检测的文案');return;}
  
  const btn=document.getElementById('checkBtn');
  const loading=document.getElementById('loading');
  btn.disabled=true;
  loading.classList.add('show');
  document.getElementById('resultArea').classList.remove('show');
  
  try{
    if(!apiKey) await register();
    
    const r=await fetch(API,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({
        jsonrpc:'2.0',id:1,method:'tools/call',
        params:{name:'cn_banned_word_check',arguments:{text,platform}}
      })
    });
    const d=await r.json();
    const content=JSON.parse(d.result.content[0].text);
    
    if(content.ok){
      renderResult(content.result);
    }else{
      alert('检测失败: '+(content.err||'未知错误'));
    }
  }catch(e){
    alert('网络错误，请重试');
    console.error(e);
  }finally{
    btn.disabled=false;
    loading.classList.remove('show');
  }
}

function renderResult(r){
  const data=r.data;
  const area=document.getElementById('resultArea');
  const stats=document.getElementById('statsBar');
  const list=document.getElementById('issueList');
  
  // Stats
  const s=data.stats||{};
  stats.innerHTML=`
    <div class="stat high"><div class="num">${s['高']||0}</div><div class="label">高风险</div></div>
    <div class="stat mid"><div class="num">${s['中']||0}</div><div class="label">中风险</div></div>
    <div class="stat low"><div class="num">${s['低']||0}</div><div class="label">低风险</div></div>
    <div class="stat tip"><div class="num">${s['提示']||0}</div><div class="label">提示</div></div>
  `;
  
  // Issues
  let html='';
  (data.bannedWords||[]).forEach(w=>{
    const cls=w.level==='高'?'':w.level==='中'?'mid-level':'low-level';
    html+=`<div class="issue-card ${cls}">
      <div class="keyword">"${w.keyword}"</div>
      <div class="category">${w.category}</div>
      <div class="law">${w.law||''}</div>
      ${w.fine?`<div class="fine">⚠️ ${w.fine}</div>`:''}
      ${w.suggestion&&w.suggestion.length?`<div class="suggestion">替换建议：${w.suggestion.map(s=>'<span>'+s+'</span>').join('')}</div>`:''}
    </div>`;
  });
  
  (data.seoIssues||[]).forEach(issue=>{
    html+=`<div class="seo-card">
      <div class="level">${issue.level}风险</div>
      <div class="message">${issue.message}</div>
    </div>`;
  });
  
  list.innerHTML=html;
  
  // Remaining
  remaining=data.remaining||0;
  document.getElementById('remaining').textContent=`今日免费剩余 ${remaining} 次`;
  if(remaining<=1){
    document.getElementById('checkBtn').textContent='💎 充值解锁更多';
    document.getElementById('checkBtn').onclick=()=>window.open('https://genetech.tools/credits','_blank');
  }
  
  area.classList.add('show');
  area.scrollIntoView({behavior:'smooth',block:'nearest'});
}
</script>
</body>
</html>
