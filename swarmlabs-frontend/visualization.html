<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>计算可视化 | 蜂群科研</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#64748b;--accent:#3b82f6;--accent2:#8b5cf6;--green:#10b981;--orange:#f59e0b;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1140px;margin:0 auto;padding:0 24px}
.nav{background:rgba(15,23,42,0.8);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-size:18px;font-weight:700}
.logo span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:20px;flex-wrap:wrap}
.nav-links a{color:var(--muted);font-size:13px;font-weight:500}
.nav-links a.active{color:var(--text)}
.page-header{padding:48px 0 32px}
.page-header h1{font-size:36px;font-weight:800;margin-bottom:8px}
.page-header p{color:var(--muted);font-size:16px}
.viz-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:32px}
@media(max-width:768px){.viz-grid{grid-template-columns:1fr}}
.viz-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.viz-title{font-size:16px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.viz-canvas{width:100%;height:250px;background:var(--bg);border:1px solid var(--border);border-radius:8px}
.input-row{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.input-field{padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px}
.btn{padding:8px 20px;background:var(--accent);color:#fff;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.legend{display:flex;gap:16px;margin-top:8px;font-size:12px;color:var(--muted)}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:10px;height:10px;border-radius:50%}
.footer{border-top:1px solid var(--border);padding:32px 0;text-align:center;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<nav class="nav">
<div class="container nav-inner">
<div class="logo">🐝 <span>蜂群科研</span></div>
<div class="nav-links">
<a href="index.html">首页</a>
<a href="quantum.html">量子计算</a>
<a href="ml-predict.html">ML预测</a>
<a href="materials.html">材料数据库</a>
<a href="visualization.html" class="active">可视化</a>
<a href="api-playground.html">API测试</a>
</div>
</div>
</nav>
<div class="container">
<div class="page-header">
<h1>📊 计算结果可视化</h1>
<p>MD能量轨迹 / 温度变化 / SHAP特征贡献 / 分子3D——科研级图表</p>
</div>

<div class="input-row">
<input class="input-field" id="smiles" value="CCO" placeholder="SMILES (如 CCO)" style="flex:1;min-width:200px">
<select class="input-field" id="viz-type">
<option value="md">MD能量轨迹</option>
<option value="shap">SHAP特征贡献</option>
<option value="uq">UQ置信区间</option>
<option value="compare">多力场对比</option>
</select>
<button class="btn" onclick="loadViz()">📊 可视化</button>
</div>

<div class="viz-grid">
<div class="viz-card">
<div class="viz-title">📈 能量/温度轨迹</div>
<canvas class="viz-canvas" id="canvas-traj"></canvas>
<div class="legend">
<div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>能量</div>
<div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>温度</div>
</div>
</div>
<div class="viz-card">
<div class="viz-title">🎯 SHAP特征贡献</div>
<canvas class="viz-canvas" id="canvas-shap"></canvas>
<div class="legend">
<div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>正向贡献</div>
<div class="legend-item"><div class="legend-dot" style="background:#ef4444"></div>负向贡献</div>
</div>
</div>
<div class="viz-card">
<div class="viz-title">📐 UQ置信区间</div>
<canvas class="viz-canvas" id="canvas-uq"></canvas>
<div class="legend">
<div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>预测值</div>
<div class="legend-item"><div class="legend-dot" style="background:rgba(59,130,246,0.2)"></div>95%CI</div>
</div>
</div>
<div class="viz-card">
<div class="viz-title">⚖️ 多力场对比</div>
<canvas class="viz-canvas" id="canvas-compare"></canvas>
<div class="legend">
<div class="legend-item"><div class="legend-dot" style="background:#3b82f6"></div>MMFF94</div>
<div class="legend-item"><div class="legend-dot" style="background:#8b5cf6"></div>UFF</div>
<div class="legend-item"><div class="legend-dot" style="background:#10b981"></div>MMFF94s</div>
</div>
</div>
</div>

</div>
<footer class="footer"><div class="container"><p>蜂群科研 — 计算可视化</p></div></footer>
<script>
const API='http://150.158.119.19:8461';
async function loadViz(){
  const smi=document.getElementById('smiles').value.trim();
  const type=document.getElementById('viz-type').value;
  if(!smi)return;
  
  if(type==='md') await loadMD(smi);
  else if(type==='shap') await loadSHAP(smi);
  else if(type==='uq') await loadUQ(smi);
  else if(type==='compare') await loadCompare(smi);
}

async function loadMD(smi){
  try{
    const resp=await fetch(`${API}/api/v1/md/simulate`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({smiles:smi,steps:300,temperature:300})});
    const d=await resp.json();
    if(d.trajectory){
      drawTrajectory(d.trajectory);
    }
  }catch(e){console.error(e);}
}

function drawTrajectory(traj){
  const c=document.getElementById('canvas-traj');
  const ctx=c.getContext('2d');
  c.width=c.offsetWidth;c.height=c.offsetHeight;
  ctx.clearRect(0,0,c.width,c.height);
  
  const energies=traj.map(t=>t.energy_kcal||t.energy_kj_mol||0).filter(e=>e!=null&&!isNaN(e));
  const temps=traj.map(t=>t.temperature_K||0).filter(t=>t!=null);
  if(energies.length===0)return;
  
  const minE=Math.min(...energies),maxE=Math.max(...energies),rangeE=maxE-minE||1;
  const minT=Math.min(...temps),maxT=Math.max(...temps),rangeT=maxT-minT||1;
  const pad=40;
  
  // 网格
  ctx.strokeStyle='#334155';ctx.lineWidth=0.5;
  for(let i=0;i<=4;i++){const y=pad+(c.height-2*pad)*i/4;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(c.width-pad,y);ctx.stroke();}
  
  // 能量曲线
  ctx.strokeStyle='#3b82f6';ctx.lineWidth=2;ctx.beginPath();
  energies.forEach((e,i)=>{const x=pad+(c.width-2*pad)*i/(energies.length-1);const y=pad+(c.height-2*pad)*(1-(e-minE)/rangeE);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();
  
  // 温度曲线
  ctx.strokeStyle='#10b981';ctx.lineWidth=2;ctx.beginPath();
  temps.forEach((t,i)=>{const x=pad+(c.width-2*pad)*i/(temps.length-1);const y=pad+(c.height-2*pad)*(1-(t-minT)/rangeT);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});
  ctx.stroke();
  
  // 标签
  ctx.fillStyle='#64748b';ctx.font='11px sans-serif';
  ctx.fillText('Step',c.width-pad-20,c.height-pad+16);
  ctx.save();ctx.translate(12,c.height/2);ctx.rotate(-Math.PI/2);ctx.fillText('Value',0,0);ctx.restore();
}

async function loadSHAP(smi){
  try{
    const resp=await fetch(`${API}/api/v1/explain/predict?smiles=${smi}&target=boiling_point`);
    const d=await resp.json();
    if(d.contributions) drawSHAP(d.contributions);
  }catch(e){console.error(e);}
}

function drawSHAP(contribs){
  const c=document.getElementById('canvas-shap');
  const ctx=c.getContext('2d');
  c.width=c.offsetWidth;c.height=c.offsetHeight;
  ctx.clearRect(0,0,c.width,c.height);
  
  const items=contribs.slice(0,8);
  const barH=(c.height-40)/items.length;
  const maxVal=Math.max(...items.map(i=>i.impact));
  
  items.forEach((item,i)=>{
    const y=20+i*barH;
    const w=(c.width-160)*(item.impact/maxVal);
    ctx.fillStyle=item.direction==='increases'?'#10b981':'#ef4444';
    ctx.fillRect(120,y,w,barH-4);
    ctx.fillStyle='#e2e8f0';ctx.font='11px monospace';ctx.textAlign='right';
    ctx.fillText(item.feature.substring(0,15),115,y+barH/2);
    ctx.textAlign='left';
    ctx.fillText(`${item.direction==='increases'?'+':'-'}${item.impact.toFixed(1)}`,120+w+5,y+barH/2);
  });
}

async function loadUQ(smi){
  try{
    const resp=await fetch(`${API}/api/v1/ml/predict_uq?smiles=${smi}`);
    const d=await resp.json();
    if(d.predictions) drawUQ(d.predictions);
  }catch(e){console.error(e);}
}

function drawUQ(preds){
  const c=document.getElementById('canvas-uq');
  const ctx=c.getContext('2d');
  c.width=c.offsetWidth;c.height=c.offsetHeight;
  ctx.clearRect(0,0,c.width,c.height);
  
  const items=Object.entries(preds);
  const barW=(c.width-80)/items.length;
  
  items.forEach(([name,p],i)=>{
    const x=40+i*barW;
    const cy=c.height/2;
    const meanH=p.mean/100*c.height*0.3;
    const ciH=p.std*2/100*c.height*0.3;
    
    // CI
    ctx.fillStyle='rgba(59,130,246,0.2)';
    ctx.fillRect(x+barW*0.2,cy-ciH-meanH,barW*0.6,ciH*2);
    
    // Mean
    ctx.fillStyle='#3b82f6';
    ctx.fillRect(x+barW*0.3,cy-meanH,barW*0.4,meanH);
    
    // Label
    ctx.fillStyle='#e2e8f0';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText(name.substring(0,12),x+barW/2,c.height-10);
    ctx.fillText(`${p.mean}±${p.std}`,x+barW/2,cy+20);
  });
}

async function loadCompare(smi){
  try{
    const resp=await fetch(`${API}/api/v1/md/compare_forcefields`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({smiles:smi})});
    const d=await resp.json();
    if(d.results) drawCompare(d.results);
  }catch(e){console.error(e);}
}

function drawCompare(results){
  const c=document.getElementById('canvas-compare');
  const ctx=c.getContext('2d');
  c.width=c.offsetWidth;c.height=c.offsetHeight;
  ctx.clearRect(0,0,c.width,c.height);
  
  const valid=results.filter(r=>r.energy_final!=null);
  if(valid.length===0)return;
  const energies=valid.map(r=>r.energy_final);
  const minE=Math.min(...energies),maxE=Math.max(...energies),range=maxE-minE||1;
  const colors=['#3b82f6','#8b5cf6','#10b981'];
  const barW=(c.width-80)/valid.length;
  
  valid.forEach((r,i)=>{
    const x=40+i*barW;
    const h=(c.height-60)*((r.energy_final-minE)/range+0.2);
    ctx.fillStyle=colors[i%3];
    ctx.fillRect(x+barW*0.2,c.height-30-h,barW*0.6,h);
    ctx.fillStyle='#e2e8f0';ctx.font='12px sans-serif';ctx.textAlign='center';
    ctx.fillText(r.forcefield||r.name,x+barW/2,c.height-12);
    ctx.fillText(r.energy_final.toFixed(2),x+barW/2,c.height-30-h-8);
  });
}

// 默认加载
loadViz();
</script>
</body>
</html>
