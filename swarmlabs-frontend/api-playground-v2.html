<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>API Playground | 蜂群科研</title>
<style>
:root{--bg:#0f172a;--card:#1e293b;--border:#334155;--text:#e2e8f0;--muted:#64748b;--accent:#3b82f6;--green:#10b981;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
.container{max-width:1100px;margin:0 auto;padding:0 24px}
.nav{background:rgba(15,23,42,0.9);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px}
.logo{font-size:18px;font-weight:700}
.logo span{background:linear-gradient(135deg,var(--accent),#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:20px;flex-wrap:wrap}
.nav-links a{color:var(--muted);font-size:13px;font-weight:500;text-decoration:none}
.nav-links a.active{color:var(--text)}
.hero{padding:40px 0 24px;text-align:center}
.hero h1{font-size:32px;font-weight:800;margin-bottom:8px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--muted);font-size:16px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin:24px 0}
.panel{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:20px}
.panel h3{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--accent)}
.input-group{margin-bottom:12px}
.input-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:4px;display:block}
.input-field{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px}
.btn{padding:10px 24px;background:linear-gradient(135deg,var(--accent),#8b5cf6);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px}
.btn:hover{opacity:0.9}
.result-box{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:16px;font-family:monospace;font-size:13px;overflow-x:auto;min-height:200px;white-space:pre-wrap}
.stat-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border)}
.stat-label{color:var(--muted);font-size:13px}
.stat-value{font-weight:600;font-size:13px}
.badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
.badge-green{background:rgba(16,185,129,0.15);color:var(--green)}
.badge-blue{background:rgba(59,130,246,0.15);color:var(--accent)}
select{width:100%;padding:8px 12px;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:14px}
</style>
</head>
<body>
<nav class="nav"><div class="container nav-inner">
<div class="logo">蜂群<span>科研</span></div>
<div class="nav-links">
<a href="index.html">首页</a>
<a href="engines.html">引擎</a>
<a href="api-docs.html">API文档</a>
<a href="api-playground-v2.html" class="active">Playground</a>
<a href="tech-barriers.html">技术壁垒</a>
</div>
</div></nav>

<div class="container">
<div class="hero">
<h1>API Playground</h1>
<p>直接调用166个虚拟实验引擎 | 无需注册 | 实时返回结果</p>
</div>

<div class="grid">
<div class="panel">
<h3>🔧 实验配置</h3>
<div class="input-group">
<label class="input-label">选择引擎</label>
<select id="engineSelect" onchange="loadEngineInfo()">
<option value="">-- 选择引擎 --</option>
</select>
</div>
<div class="input-group">
<label class="input-label">温度 (°C)</label>
<input type="number" class="input-field" id="temp" value="80" />
</div>
<div class="input-group">
<label class="input-label">浓度 (mol/L)</label>
<input type="number" class="input-field" id="conc" value="1.0" step="0.1" />
</div>
<div class="input-group">
<label class="input-label">时间 (小时)</label>
<input type="number" class="input-field" id="time" value="4" step="0.5" />
</div>
<div class="input-group">
<label class="input-label">压力 (bar)</label>
<input type="number" class="input-field" id="pressure" value="1.0" step="0.5" />
</div>
<button class="btn" onclick="runExperiment()">▶ 运行实验</button>
<button class="btn" onclick="optimizeEngine()" style="background:linear-gradient(135deg,#10b981,#3b82f6)">⚡ AI优化</button>
<button class="btn" onclick="validateEngine()" style="background:linear-gradient(135deg,#f59e0b,#ef4444)">✓ 验证精度</button>
</div>

<div class="panel">
<h3>📊 实验结果</h3>
<div id="resultArea" class="result-box">选择引擎并点击"运行实验"查看结果...</div>
<div id="statsArea" style="margin-top:12px"></div>
</div>
</div>

<div class="panel" style="margin-top:20px">
<h3>📖 引擎信息</h3>
<div id="engineInfo" class="result-box">选择引擎查看详情...</div>
</div>
</div>

<script>
const API_BASE = 'http://localhost:8461';

// 加载引擎列表
async function loadEngines() {
    try {
        const resp = await fetch(`${API_BASE}/api/v1/engines/all`);
        const data = await resp.json();
        const select = document.getElementById('engineSelect');
        data.engines.forEach(e => {
            const opt = document.createElement('option');
            opt.value = e.name;
            opt.textContent = `${e.name} | ${e.domain} | ${e.n_validations}组验证`;
            select.appendChild(opt);
        });
        document.getElementById('resultArea').textContent = `✅ 已加载 ${data.total} 个引擎`;
    } catch(e) {
        // 降级——用本地数据
        document.getElementById('resultArea').textContent = '⚠️ API离线，请稍后重试\n错误: ' + e.message;
    }
}

async function loadEngineInfo() {
    const engine = document.getElementById('engineSelect').value;
    if (!engine) return;
    try {
        const resp = await fetch(`${API_BASE}/api/v2/info/${engine}`);
        const data = await resp.json();
        document.getElementById('engineInfo').textContent = JSON.stringify(data, null, 2);
    } catch(e) {
        document.getElementById('engineInfo').textContent = '错误: ' + e.message;
    }
}

async function runExperiment() {
    const engine = document.getElementById('engineSelect').value;
    if (!engine) { alert('请先选择引擎'); return; }
    
    const params = {
        temperature_C: parseFloat(document.getElementById('temp').value),
        concentration: parseFloat(document.getElementById('conc').value),
        time_h: parseFloat(document.getElementById('time').value),
        pressure_bar: parseFloat(document.getElementById('pressure').value),
    };
    
    document.getElementById('resultArea').textContent = '⏳ 运行中...';
    
    try {
        const resp = await fetch(`${API_BASE}/api/v2/run/${engine}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(params)
        });
        const data = await resp.json();
        const result = data.result || {};
        
        document.getElementById('resultArea').textContent = JSON.stringify(data, null, 2);
        
        // 显示关键统计
        const stats = `
            <div class="stat-row"><span class="stat-label">预测值</span><span class="stat-value">${result.result || 'N/A'}%</span></div>
            <div class="stat-row"><span class="stat-label">不确定性</span><span class="stat-value">±${result.uncertainty || 'N/A'}%</span></div>
            <div class="stat-row"><span class="stat-label">95%置信区间</span><span class="stat-value">${result.confidence_interval ? result.confidence_interval[0] + '-' + result.confidence_interval[1] + '%' : 'N/A'}</span></div>
            <div class="stat-row"><span class="stat-label">模型</span><span class="stat-value">${result.model || 'N/A'}</span></div>
            <div class="stat-row"><span class="stat-label">验证基础</span><span class="stat-value">${result.validation_basis ? result.validation_basis.n_validations + '组' : 'N/A'}</span></div>
        `;
        document.getElementById('statsArea').innerHTML = stats;
    } catch(e) {
        document.getElementById('resultArea').textContent = '❌ 错误: ' + e.message;
    }
}

async function optimizeEngine() {
    const engine = document.getElementById('engineSelect').value;
    if (!engine) { alert('请先选择引擎'); return; }
    
    document.getElementById('resultArea').textContent = '⏳ AI优化中(100次迭代)...';
    
    try {
        const resp = await fetch(`${API_BASE}/api/v2/optimize/${engine}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({n_iterations: 100})
        });
        const data = await resp.json();
        const opt = data.optimization || {};
        
        document.getElementById('resultArea').textContent = 
            `⚡ AI优化结果\n\n最优参数:\n  温度: ${opt.best_params?.temperature_C?.toFixed(1)}°C\n  浓度: ${opt.best_params?.concentration?.toFixed(2)} mol/L\n  时间: ${opt.best_params?.time_h?.toFixed(1)} h\n\n最优结果: ${opt.best_result}%\n得分: ${opt.best_score}\n迭代: ${opt.n_iterations}次`;
    } catch(e) {
        document.getElementById('resultArea').textContent = '❌ 错误: ' + e.message;
    }
}

async function validateEngine() {
    const engine = document.getElementById('engineSelect').value;
    if (!engine) { alert('请先选择引擎'); return; }
    
    try {
        const resp = await fetch(`${API_BASE}/api/v2/validate/${engine}`);
        const data = await resp.json();
        const v = data.validation || {};
        
        document.getElementById('resultArea').textContent = 
            `✓ 验证报告\n\n验证数据: ${v.n_validations}组\n均值误差: ${v.mean_error}%\n中位数: ${v.median_error}%\n最大误差: ${v.max_error}%\n最小误差: ${v.min_error}%\n\n误差分布:\n  <5%: ${v.within_5pct}组\n  <10%: ${v.within_10pct}组\n  <15%: ${v.within_15pct}组\n\n可靠性: ${v.reliability}%`;
    } catch(e) {
        document.getElementById('resultArea').textContent = '❌ 错误: ' + e.message;
    }
}

loadEngines();
</script>
</body>
</html>
