<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蜂群科研 - 虚拟加速实验器</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.header { background: linear-gradient(135deg, #1e293b, #334155); padding: 20px 30px; border-bottom: 1px solid #475569; }
.header h1 { font-size: 24px; color: #38bdf8; }
.header p { font-size: 14px; color: #94a3b8; margin-top: 5px; }
.container { display: flex; gap: 20px; padding: 20px; max-width: 1400px; margin: 0 auto; }
.sidebar { width: 280px; background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; }
.main { flex: 1; background: #1e293b; border-radius: 12px; padding: 20px; border: 1px solid #334155; min-height: 600px; }
.section-title { font-size: 16px; color: #38bdf8; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #334155; }
.mode-btn { display: block; width: 100%; padding: 12px; margin-bottom: 8px; background: #334155; border: 1px solid #475569; border-radius: 8px; color: #e2e8f0; cursor: pointer; text-align: left; transition: all 0.2s; }
.mode-btn:hover { background: #475569; border-color: #38bdf8; }
.mode-btn.active { background: #0ea5e9; border-color: #38bdf8; }
.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-size: 13px; color: #94a3b8; margin-bottom: 5px; }
.form-group select, .form-group input { width: 100%; padding: 8px 12px; background: #0f172a; border: 1px solid #475569; border-radius: 6px; color: #e2e8f0; font-size: 14px; }
.form-group select:focus, .form-group input:focus { outline: none; border-color: #38bdf8; }
.btn-run { width: 100%; padding: 12px; background: linear-gradient(135deg, #0ea5e9, #2563eb); border: none; border-radius: 8px; color: white; font-size: 16px; cursor: pointer; transition: all 0.2s; }
.btn-run:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(14,165,233,0.4); }
.btn-run:disabled { opacity: 0.5; cursor: not-allowed; }
.result-card { background: #0f172a; border-radius: 8px; padding: 15px; margin-bottom: 10px; border: 1px solid #334155; }
.result-label { font-size: 12px; color: #64748b; }
.result-value { font-size: 20px; font-weight: bold; color: #38bdf8; }
.result-bar { height: 8px; background: #334155; border-radius: 4px; margin-top: 8px; overflow: hidden; }
.result-bar-fill { height: 100%; background: linear-gradient(90deg, #0ea5e9, #2563eb); border-radius: 4px; transition: width 0.5s; }
.rank-item { display: flex; align-items: center; padding: 10px; background: #0f172a; border-radius: 6px; margin-bottom: 6px; border: 1px solid #334155; }
.rank-num { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 12px; }
.rank-1 { background: #f59e0b; color: #000; }
.rank-2 { background: #94a3b8; color: #000; }
.rank-3 { background: #b45309; color: #000; }
.rank-4plus { background: #334155; color: #e2e8f0; }
.rank-info { flex: 1; }
.rank-name { font-size: 14px; font-weight: 500; }
.rank-value { font-size: 12px; color: #64748b; }
.loading { text-align: center; padding: 40px; color: #64748b; }
.spinner { display: inline-block; width: 40px; height: 40px; border: 3px solid #334155; border-top: 3px solid #38bdf8; border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.badge-safe { background: #065f46; color: #34d399; }
.badge-caution { background: #78350f; color: #fbbf24; }
.badge-danger { background: #7f1d1d; color: #f87171; }
.badge-high { background: #065f46; color: #34d399; }
.badge-medium { background: #78350f; color: #fbbf24; }
.badge-low { background: #7f1d1d; color: #f87171; }
.chart-container { background: #0f172a; border-radius: 8px; padding: 15px; margin-top: 10px; }
canvas { max-width: 100%; }
.aging-curve { display: flex; align-items: end; gap: 4px; height: 120px; padding: 10px 0; }
.aging-bar { flex: 1; background: linear-gradient(180deg, #38bdf8, #0ea5e9); border-radius: 4px 4px 0 0; position: relative; min-height: 4px; transition: height 0.5s; }
.aging-bar:hover { background: linear-gradient(180deg, #fbbf24, #f59e0b); }
.aging-label { position: absolute; bottom: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #64748b; white-space: nowrap; }
.aging-value { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #38bdf8; }
.tag { display: inline-block; padding: 2px 6px; background: #334155; border-radius: 4px; font-size: 11px; margin: 2px; }
.param-input-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
.param-input-row label { width: 120px; font-size: 13px; color: #94a3b8; }
.param-input-row input { flex: 1; }

@media print {
    .sidebar { display: none; }
    .container { padding: 0; }
    .main { border: none; }
}
.btn-export { padding: 8px 16px; background: linear-gradient(135deg, #059669, #047857); border: none; border-radius: 8px; color: white; font-size: 14px; cursor: pointer; margin-left: 10px; }
.btn-export:hover { transform: translateY(-1px); }
</style>
</head>
<body>
<div class="header">
    <h1>蜂群科研 - 虚拟加速实验器</h1>
    <p>30引擎 × 278种材料 × 加速老化 × 成本优化 × 安全检测</p>
</div>
<div class="container">
    <div class="sidebar">
        <div class="section-title">实验模式</div>
        <button class="mode-btn active" onclick="switchMode('overview')" id="btn-overview">📊 平台概览</button>
        <button class="mode-btn" onclick="switchMode('screen')" id="btn-screen">筛选材料（从库中选Top）</button>
        <button class="mode-btn" onclick="switchMode('run')" id="btn-run">运行实验（输入条件预测）</button>
        <button class="mode-btn" onclick="switchMode('aging')" id="btn-aging">加速老化（模拟N年）</button>
        <button class="mode-btn" onclick="switchMode('formulation')" id="btn-formulation">配方搜索（找最优配比）</button>
        <button class="mode-btn" onclick="switchMode('safety')" id="btn-safety">安全检测（极端条件）</button>
        <button class="mode-btn" onclick="switchMode('chain')" id="btn-chain">流程串联（多步工艺）</button>
        <button class="mode-btn" onclick="switchMode('report')" id="btn-report">精度报告（泛化验证）</button>
        <button class="mode-btn" onclick="switchMode('compare')" id="btn-compare">实验对比（A/B对照）</button>
        <button class="mode-btn" onclick="switchMode('materials')" id="btn-materials">材料库（426种）</button>
        
        <div style="margin-top: 20px;">
            <div class="section-title">API状态</div>
            <div id="api-status" style="font-size: 13px; color: #64748b;">检查中...</div>
        </div>
        <div style="margin-top: 20px;">
            <div class="section-title">历史记录</div>
            <div id="history-list" style="font-size: 12px; color: #64748b;"></div>
            <button onclick="clearHistory()" style="margin-top:5px;padding:4px 8px;background:#334155;border:none;border-radius:4px;color:#94a3b8;cursor:pointer;font-size:11px;">清空</button>
        </div>
    </div>
    
    <div class="main" id="main-content">
        <!-- 动态内容 -->
    </div>
</div>

<script>
const API_BASE = 'http://150.158.119.19:8461';
let currentMode = 'overview';
let enginesCache = null;

async function api(path, options = {}) {
    const url = API_BASE + path;
    const resp = await fetch(url, { ...options, headers: { 'Content-Type': 'application/json', ...options.headers } });
    return resp.json();
}

async function checkAPI() {
    try {
        const data = await api('/api/v1/health');
        document.getElementById('api-status').innerHTML = `<span style="color:#34d399;">● 在线</span> — ${data.engines}引擎`;
        return true;
    } catch {
        document.getElementById('api-status').innerHTML = '<span style="color:#f87171;">● 离线</span>';
        return false;
    }
}

async function loadEngines() {
    if (enginesCache) return enginesCache;
    const data = await api('/api/v1/engines');
    enginesCache = data.engines;
    return enginesCache;
}

function switchMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('btn-' + mode).classList.add('active');
    renderMode();
}

async function renderMode() {
    const main = document.getElementById('main-content');
    const engines = await loadEngines();
    
    if (currentMode === 'overview') {
        main.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在加载...</p></div>';
        loadOverview(engines);
    } else if (currentMode === 'screen') {
        main.innerHTML = `
            <div class="section-title">筛选材料 — 从材料库自动选出Top-K</div>
            <div class="form-group">
                <label>实验领域</label>
                <select id="screen-engine">${engines.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}</select>
            </div>
            <div class="form-group">
                <label>选出前几名</label>
                <select id="screen-topk">
                    <option value="3">Top 3</option>
                    <option value="5" selected>Top 5</option>
                    <option value="10">Top 10</option>
                </select>
            </div>
            <button class="btn-run" onclick="runScreening()">开始筛选</button>
            <div id="screen-result" style="margin-top: 20px;"></div>
        `;
    } else if (currentMode === 'run') {
        main.innerHTML = `
            <div class="section-title">运行实验 — 输入条件预测结果</div>
            <div class="form-group">
                <label>实验领域</label>
                <select id="run-engine" onchange="loadEngineParams()">${engines.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}</select>
            </div>
            <div id="run-params"></div>
            <button class="btn-run" onclick="runExperiment()">运行实验</button>
            <div id="run-result" style="margin-top: 20px;"></div>
        `;
        loadEngineParams();
    } else if (currentMode === 'aging') {
        main.innerHTML = `
            <div class="section-title">加速老化 — 模拟数月/数年老化</div>
            <div class="form-group">
                <label>实验领域</label>
                <select id="aging-engine" onchange="loadAgingParams()">${engines.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}</select>
            </div>
            <div id="aging-params"></div>
            <div class="form-group">
                <label>模拟时长（年）</label>
                <input type="number" id="aging-years" value="5" min="0.1" max="50" step="0.5">
            </div>
            <div class="form-group">
                <label>环境类型</label>
                <select id="aging-env">
                    <option value="standard">标准条件（实验室）</option>
                    <option value="outdoor" selected>户外（风吹日晒）</option>
                    <option value="humid">高湿环境</option>
                    <option value="uv">强紫外照射</option>
                    <option value="thermal_cycle">温度循环</option>
                    <option value="corrosive">腐蚀环境</option>
                </select>
            </div>
            <button class="btn-run" onclick="runAging()">开始老化模拟</button>
            <div id="aging-result" style="margin-top: 20px;"></div>
        `;
        loadAgingParams();
    } else if (currentMode === 'formulation') {
        main.innerHTML = `
            <div class="section-title">配方搜索 — 在参数空间搜索最优配比</div>
            <div class="form-group">
                <label>实验领域</label>
                <select id="form-engine">${engines.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}</select>
            </div>
            <div class="form-group">
                <label>预算约束（元，0=无约束）</label>
                <input type="number" id="form-budget" value="0" min="0">
            </div>
            <div class="form-group">
                <label>最大评估次数</label>
                <input type="number" id="form-maxeval" value="50" min="10" max="500">
            </div>
            <button class="btn-run" onclick="runFormulation()">搜索最优配比</button>
            <div id="form-result" style="margin-top: 20px;"></div>
        `;
    } else if (currentMode === 'chain') {
        main.innerHTML = `
            <div class="section-title">流程串联 — 多引擎串联模拟完整工艺链</div>
            <div style="background:#0f172a;border-radius:8px;padding:15px;margin-bottom:15px;border:1px solid #334155;">
                <div style="font-size:13px;color:#94a3b8;margin-bottom:8px;">流程示例：光催化产氢 → 膜分离纯化 → 结晶</div>
                <div id="chain-steps"></div>
                <button class="btn-run" style="margin-top:10px;width:auto;padding:8px 16px;font-size:14px;" onclick="addChainStep()">+ 添加步骤</button>
                <button class="btn-run" style="margin-top:10px;width:auto;padding:8px 16px;font-size:14px;margin-left:10px;background:linear-gradient(135deg,#f59e0b,#d97706);" onclick="runChain()">运行流程</button>
            </div>
            <div id="chain-result" style="margin-top: 20px;"></div>
        `;
        addChainStep();
    } else if (currentMode === 'report') {
        main.innerHTML = `
            <div class="section-title">泛化精度验证报告 — 80/20拆分测试</div>
            <div id="report-content"><div class="loading"><div class="spinner"></div><p>正在加载...</p></div></div>
        `;
        loadReport();
    } else if (currentMode === 'compare') {
        main.innerHTML = `
            <div class="section-title">实验对比 — A/B条件对照</div>
            <div style="display:flex;gap:15px;">
                <div style="flex:1;background:#0f172a;border-radius:8px;padding:15px;border:1px solid #334155;">
                    <div style="font-size:14px;color:#38bdf8;margin-bottom:10px;">方案A</div>
                    <div class="form-group">
                        <label>实验领域</label>
                        <select id="compare-engine-a">${engines.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}</select>
                    </div>
                    <div class="form-group">
                        <label>温度（°C）</label>
                        <input type="number" id="compare-temp-a" value="25">
                    </div>
                    <div class="form-group">
                        <label>pH</label>
                        <input type="number" id="compare-ph-a" value="7" step="0.5">
                    </div>
                </div>
                <div style="flex:1;background:#0f172a;border-radius:8px;padding:15px;border:1px solid #334155;">
                    <div style="font-size:14px;color:#f59e0b;margin-bottom:10px;">方案B</div>
                    <div class="form-group">
                        <label>实验领域</label>
                        <select id="compare-engine-b">${engines.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}</select>
                    </div>
                    <div class="form-group">
                        <label>温度（°C）</label>
                        <input type="number" id="compare-temp-b" value="60">
                    </div>
                    <div class="form-group">
                        <label>pH</label>
                        <input type="number" id="compare-ph-b" value="5" step="0.5">
                    </div>
                </div>
            </div>
            <button class="btn-run" onclick="runCompare()">对比运行</button>
            <div id="compare-result" style="margin-top: 20px;"></div>
        `;
    } else if (currentMode === 'materials') {
        main.innerHTML = `
            <div class="section-title">材料库 — 30领域426种材料</div>
            <div class="form-group">
                <label>选择领域</label>
                <select id="mat-engine" onchange="loadMaterials()">${engines.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}</select>
            </div>
            <div id="mat-list"></div>
        `;
        loadMaterials();
    } else if (currentMode === 'safety') {
        main.innerHTML = `
            <div class="section-title">安全检测 — 极端条件可靠性评估</div>
            <div class="form-group">
                <label>实验领域</label>
                <select id="safety-engine" onchange="loadSafetyParams()">${engines.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}</select>
            </div>
            <div id="safety-params"></div>
            <button class="btn-run" onclick="runSafety()">安全检测</button>
            <div id="safety-result" style="margin-top: 20px;"></div>
        `;
        loadSafetyParams();
    }
}

async function loadEngineParams() {
    const engine = document.getElementById('run-engine').value;
    const materials = await api('/api/v1/materials/' + engine);
    let html = '<div class="form-group"><label>选择材料</label><select id="run-material">';
    html += materials.materials.map(m => `<option value="${m}">${m}</option>`).join('');
    html += '</select></div>';
    html += `<div class="form-group"><label>温度（°C）</label><input type="number" id="run-temp" value="25"></div>`;
    html += `<div class="form-group"><label>pH</label><input type="number" id="run-ph" value="7" step="0.5"></div>`;
    document.getElementById('run-params').innerHTML = html;
}

async function loadAgingParams() {
    const engine = document.getElementById('aging-engine').value;
    const materials = await api('/api/v1/materials/' + engine);
    let html = '<div class="form-group"><label>选择材料</label><select id="aging-material">';
    html += materials.materials.map(m => `<option value="${m}">${m}</option>`).join('');
    html += '</select></div>';
    document.getElementById('aging-params').innerHTML = html;
}

async function loadSafetyParams() {
    const engine = document.getElementById('safety-engine').value;
    const materials = await api('/api/v1/materials/' + engine);
    let html = '<div class="form-group"><label>选择材料</label><select id="safety-material">';
    html += materials.materials.map(m => `<option value="${m}">${m}</option>`).join('');
    html += '</select></div>';
    html += `<div class="form-group"><label>温度（°C）— 试试极端值</label><input type="number" id="safety-temp" value="25"></div>`;
    html += `<div class="form-group"><label>pH — 试试1或14</label><input type="number" id="safety-ph" value="7" step="0.5"></div>`;
    document.getElementById('safety-params').innerHTML = html;
}

async function getMaterialConditions(engine, materialName) {
    const materials = await api('/api/v1/materials/' + engine);
    const materialsData = materials.materials;
    // 从material library获取条件——这里简化用默认条件
    return { material: materialName };
}

let chainStepCount = 0;

async function addChainStep() {
    chainStepCount++;
    const engines = await loadEngines();
    const div = document.getElementById('chain-steps');
    const stepDiv = document.createElement('div');
    stepDiv.id = 'chain-step-' + chainStepCount;
    stepDiv.className = 'rank-item';
    stepDiv.style.cssText = 'margin-bottom:8px;flex-direction:column;align-items:stretch;';
    stepDiv.innerHTML = `
        <div style="display:flex;align-items:center;width:100%;">
            <div class="rank-num rank-4plus" style="margin-right:8px;">${chainStepCount}</div>
            <select id="chain-engine-${chainStepCount}" style="flex:1;margin-right:8px;" onchange="loadChainMaterials(${chainStepCount})">
                ${engines.map(e => `<option value="${e.id}">${e.name}</option>`).join('')}
            </select>
            <button onclick="document.getElementById('chain-step-${chainStepCount}').remove()" style="padding:4px 8px;background:#7f1d1d;border:none;border-radius:4px;color:#f87171;cursor:pointer;">删除</button>
        </div>
        <div id="chain-params-${chainStepCount}" style="margin-top:8px;width:100%;"></div>
    `;
    div.appendChild(stepDiv);
    loadChainMaterials(chainStepCount);
}

async function loadChainMaterials(stepNum) {
    const engine = document.getElementById('chain-engine-' + stepNum).value;
    const materials = await api('/api/v1/materials/' + engine);
    const paramsDiv = document.getElementById('chain-params-' + stepNum);
    let html = '<div style="display:flex;gap:8px;align-items:center;">';
    html += '<label style="font-size:12px;color:#94a3b8;width:60px;">材料:</label>';
    html += `<select id="chain-material-${stepNum}" style="flex:1;">${materials.materials.map(m => `<option value="${m}">${m}</option>`).join('')}</select>`;
    html += '</div>';
    paramsDiv.innerHTML = html;
}

async function runChain() {
    const resultDiv = document.getElementById('chain-result');
    resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在运行流程串联...</p></div>';
    
    const steps = [];
    for (let i = 1; i <= chainStepCount; i++) {
        const stepDiv = document.getElementById('chain-step-' + i);
        if (!stepDiv) continue;
        const engine = document.getElementById('chain-engine-' + i).value;
        const material = document.getElementById('chain-material-' + i).value;
        steps.push({
            engine: engine,
            conditions: { material: material },
        });
    }
    
    if (steps.length < 2) {
        resultDiv.innerHTML = '<div style="color:#fbbf24;">请至少添加2个步骤</div>';
        return;
    }
    
    try {
        const data = await api('/api/v1/process_chain', {
            method: 'POST',
            body: JSON.stringify({ steps: steps })
        });
        
        let html = '<div class="section-title">流程结果</div>';
        
        // 流程步骤展示
        data.steps.forEach((step, i) => {
            const val = step.primary_value !== null ? step.primary_value.toFixed(3) : 'N/A';
            html += `
                <div class="result-card">
                    <div style="display:flex;align-items:center;">
                        <div class="rank-num ${i < 3 ? 'rank-' + (i+1) : 'rank-4plus'}" style="margin-right:12px;">${step.step}</div>
                        <div style="flex:1;">
                            <div class="result-label">Step ${step.step}: ${step.engine}</div>
                            <div class="result-value" style="font-size:16px;">${step.primary_metric} = ${val}</div>
                            <div style="font-size:12px;color:#64748b;">不确定性: ${step.uncertainty} | 可靠性: ${step.reliability}</div>
                        </div>
                    </div>
                </div>
            `;
        });
        
        // 累积不确定性
        const unc = data.accumulated_uncertainty_pct;
        const uncColor = unc < 10 ? '#34d399' : unc < 20 ? '#fbbf24' : '#f87171';

    const engineA = document.getElementById('compare-engine-a').value;
    const engineB = document.getElementById('compare-engine-b').value;
    const tempA = parseFloat(document.getElementById('compare-temp-a').value);
    const tempB = parseFloat(document.getElementById('compare-temp-b').value);
    const phA = parseFloat(document.getElementById('compare-ph-a').value);
    const phB = parseFloat(document.getElementById('compare-ph-b').value);
    
    try {
        const [rA, rB] = await Promise.all([
            api('/api/v1/run/' + engineA, { method: 'POST', body: JSON.stringify({ conditions: { temperature: tempA, temperature_C: tempA, pH: phA } }) }),
            api('/api/v1/run/' + engineB, { method: 'POST', body: JSON.stringify({ conditions: { temperature: tempB, temperature_C: tempB, pH: phB } }) }),

        const resA = rA.result || {};

async function submitFeedback(engine) {
    const actual = parseFloat(document.getElementById('feedback-actual').value);
    const note = document.getElementById('feedback-note').value;
    
    if (isNaN(actual)) {
        document.getElementById('feedback-result').innerHTML = '<div style="color:#fbbf24;">请输入数值</div>';
        return;
    }
    
    document.getElementById('feedback-result').innerHTML = '<div class="loading"><div class="spinner" style="width:20px;height:20px;border-width:2px;"></div></div>';
    
    try {
        const predicted = window._lastPredicted || {};
        const pm = predicted._primary_metric || '';
        const predValue = predicted[pm] || 0;
        
        const resp = await fetch(API_BASE + '/api/v1/feedback/submit', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                engine_id: engine,
                conditions: window._lastConditions || {},
                predicted: { [pm]: predValue },
                actual: { [pm]: actual },
            })
        });
        
        const data = await resp.json();
        
        const errPct = ((predValue - actual) / Math.abs(actual) * 100).toFixed(1);
        const errColor = Math.abs(errPct) < 5 ? '#34d399' : Math.abs(errPct) < 10 ? '#fbbf24' : '#f87171';
        
        document.getElementById('feedback-result').innerHTML = `
            <div style="padding:10px;background:#0f172a;border-radius:6px;border:1px solid #334155;">
                <div style="font-size:13px;color:#94a3b8;">预测值: ${predValue.toFixed(3)} | 真实值: ${actual}</div>
                <div style="font-size:16px;color:${errColor};font-weight:bold;margin-top:5px;">误差: ${errPct}%</div>
                <div style="font-size:12px;color:#64748b;margin-top:5px;">✅ 反馈已记录，感谢贡献！模型将据此持续优化。</div>
            </div>
        `;
    } catch (e) {
        document.getElementById('feedback-result').innerHTML = `<div style="color:#f87171;">提交失败: ${e.message}</div>`;
    }
}

    const budget = parseFloat(document.getElementById('form-budget').value);
    const maxEval = parseInt(document.getElementById('form-maxeval').value);
    const resultDiv = document.getElementById('form-result');
    resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在搜索最优配比...</p></div>';
    
    try {
        // 使用通用参数范围
        const paramRanges = {
            'temperature_C': [20, 80, 10],
            'pH': [3, 9, 1],
        };
        
        let data;
        if (budget > 0) {
            // 成本约束搜索
            data = await api('/api/v1/cost_search', {
                method: 'POST',
                body: JSON.stringify({
                    engine: engine,
                    param_ranges: paramRanges,
                    cost_model: { 'temperature_C': 0.5, 'pH': 5 },
                    budget: budget,
                    max_evaluations: maxEval,
                })
            });
        } else {
            // 无约束搜索
            data = await api('/api/v1/formulation', {
                method: 'POST',
                body: JSON.stringify({
                    engine: engine,
                    param_ranges: paramRanges,
                    max_evaluations: maxEval,
                })
            });
        }
        
        let html = '<div class="section-title">配方搜索结果</div>';
        
        if (data.error) {
            html += `<div style="color:#f87171;">${data.error}</div>`;
        } else if (data.optimal_in_budget) {
            // 成本约束结果
            html += `
                <div class="result-card">
                    <div class="result-label">预算内最优方案（预算${data.budget}元）</div>
                    <div class="result-value">${data.optimal_in_budget.value.toFixed(2)}</div>
                    <div style="margin-top:8px;font-size:13px;color:#94a3b8;">成本: ${data.optimal_in_budget.cost}元 | 性价比: ${data.optimal_in_budget.cost_efficiency}</div>
                </div>
                <div class="result-card">
                    <div class="result-label">无预算约束最优</div>
                    <div style="font-size:18px;color:#94a3b8;">${data.optimal_no_budget.value.toFixed(2)} <span style="font-size:13px;">(成本${data.optimal_no_budget.cost}元)</span></div>
                    <div style="margin-top:5px;font-size:13px;color:#fbbf24;">性能损失: ${data.performance_loss_pct}%</div>
                </div>
            `;
            // Top 5
            html += '<div class="section-title" style="margin-top:15px;">Top 5方案</div>';
            data.top_5_in_budget.forEach((item, i) => {
                html += `
                    <div class="rank-item">
                        <div class="rank-num ${i < 3 ? 'rank-' + (i+1) : 'rank-4plus'}">${i+1}</div>
                        <div class="rank-info">
                            <div class="rank-name">性能=${item.value.toFixed(2)} | 成本=${item.cost}元</div>
                            <div class="rank-value">${JSON.stringify(item.conditions)}</div>
                        </div>
                    </div>
                `;
            });
        } else if (data.optimal_conditions) {
            // 无约束结果
            html += `
                <div class="result-card">
                    <div class="result-label">最优配比</div>
                    <div class="result-value">${data.optimal_value.toFixed(2)}</div>
                    <div style="margin-top:8px;font-size:13px;color:#94a3b8;">${JSON.stringify(data.optimal_conditions)}</div>
                    <div style="margin-top:5px;">搜索空间: ${data.search_space_size} | 评估: ${data.evaluated}组</div>
                </div>
            `;
            // Top 5
            html += '<div class="section-title" style="margin-top:15px;">Top 5方案</div>';
            data.top_5.forEach((item, i) => {
                html += `
                    <div class="rank-item">
                        <div class="rank-num ${i < 3 ? 'rank-' + (i+1) : 'rank-4plus'}">${i+1}</div>
                        <div class="rank-info">
                            <div class="rank-name">性能=${item.value.toFixed(2)}</div>
                            <div class="rank-value">${JSON.stringify(item.conditions)}</div>
                        </div>
                    </div>
                `;
            });
        }
        
        resultDiv.innerHTML = html;
    } catch (e) {
        resultDiv.innerHTML = `<div style="color:#f87171;">错误: ${e.message}</div>`;
    }
}

// ========== 安全检测模式 ==========
async function runSafety() {
    const engine = document.getElementById('safety-engine').value;
    const material = document.getElementById('safety-material').value;
    const temp = parseFloat(document.getElementById('safety-temp').value);
    const pH = parseFloat(document.getElementById('safety-ph').value);
    const resultDiv = document.getElementById('safety-result');
    resultDiv.innerHTML = '<div class="loading"><div class="spinner"></div><p>正在检测安全边界...</p></div>';
    
    try {
        const conditions = await getMaterialConditions(engine, material);
        conditions.temperature = temp;
        conditions.temperature_C = temp;
        conditions.pH = pH;
        
        const data = await api('/api/v1/safety_check', {
            method: 'POST',
            body: JSON.stringify({ engine: engine, conditions: conditions })
        });
        
        let html = '<div class="section-title">安全检测结果</div>';
        
        const levelColor = data.safety_level === 'safe' ? '#34d399' : data.safety_level === 'caution' ? '#fbbf24' : '#f87171';
        html += `
            <div class="result-card" style="border-color:${levelColor};">
                <div class="result-label">安全等级</div>
                <div class="result-value" style="color:${levelColor};">${data.safety_level_cn}</div>
                <div style="margin-top:10px;">
                    <span class="badge badge-${data.safety_level}">${data.estimated_error}</span>
                    <span style="margin-left:8px;font-size:13px;color:#94a3b8;">误差倍增: ${data.error_multiplier}x</span>
                </div>
            </div>
        `;
        
        if (data.warnings.length > 0) {
            html += '<div class="result-card"><div class="result-label">警告信息</div>';
            data.warnings.forEach(w => {
                html += `<div style="padding:8px 0;color:#fbbf24;">⚠ ${w}</div>`;
            });
            html += '</div>';
        }
        
        html += `<div class="result-card"><div class="result-label">建议</div><div style="margin-top:8px;">${data.recommendation}</div></div>`;
        
        resultDiv.innerHTML = html;
    } catch (e) {
        resultDiv.innerHTML = `<div style="color:#f87171;">错误: ${e.message}</div>`;
    }
}

// 历史记录
function saveHistory(mode, summary) {
    let history = JSON.parse(localStorage.getItem('swarmlabs_history') || '[]');
    history.unshift({ mode, summary, time: new Date().toLocaleTimeString('zh-CN', {hour:'2-digit',minute:'2-digit'}) });
    history = history.slice(0, 10);
    localStorage.setItem('swarmlabs_history', JSON.stringify(history));
    renderHistory();
}

function renderHistory() {
    const history = JSON.parse(localStorage.getItem('swarmlabs_history') || '[]');
    const div = document.getElementById('history-list');
    if (!div) return;
    if (history.length === 0) {
        div.innerHTML = '<div style="color:#475569;">暂无记录</div>';
        return;
    }
    div.innerHTML = history.map(h => `<div style="padding:3px 0;border-bottom:1px solid #1e293b;"><span style="color:#38bdf8;">${h.time}</span> ${h.mode}<br><span style="color:#475569;font-size:11px;">${h.summary}</span></div>`).join('');
}

function clearHistory() {
    localStorage.removeItem('swarmlabs_history');
    renderHistory();
}

// 初始化
checkAPI();
renderMode();
renderHistory();
</script>
